<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于 - SParks 的书架</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            transition: all 0.3s ease;
        }

        body {
            background-color: #6b7b76;
            background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 4px);
            color: #ffffff;
            padding: 20px;
        }
        body.light {
            background-color: #f0ebe5;
            background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.02) 0px, rgba(0,0,0,0.02) 1px, transparent 1px, transparent 4px);
            color: #333333;
        }

        .site-header {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
            border-radius: 8px;
            margin-bottom: 40px;
        }
        body.light .site-header {
            background-color: rgba(255, 255, 255, 0.7);
        }

        .site-title {
            font-size: 20px;
            font-weight: 500;
            cursor: pointer;
        }
        .site-nav {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .site-nav a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
        }
        body.light .site-nav a {
            color: #333;
        }
        .site-nav a:first-child {
            color: #ff6b35;
            font-weight: 500;
        }

        .theme-toggle {
            cursor: pointer;
            font-size: 16px;
            margin-left: 10px;
        }

        .about-content {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            backdrop-filter: blur(4px);
        }
        body.light .about-content {
            background-color: rgba(255, 255, 255, 0.5);
        }
        .about-content h1 {
            font-size: 28px;
            margin-bottom: 20px;
            color: #ff6b35;
        }
        .about-content p {
            margin-bottom: 16px;
            line-height: 1.6;
        }
        .about-content a {
            color: #ff6b35;
            text-decoration: none;
        }
        .about-content a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="site-header">
        <div class="site-title" id="homeLink">SParks 的书架</div>
        <div class="site-nav">
            <a href="category.html">分类</a>
            <a href="about.html">关于</a>
            <span class="theme-toggle">☀️</span>
        </div>
    </div>

    <div class="about-content">
        <h1>关于本站</h1>
        <p>这是一个个人知识收藏站，用于整理读书笔记和学习资源。</p>
        <p>所有内容均为个人学习使用，如有侵权请联系删除。</p>
        <p>本站使用纯静态技术构建，托管于 GitHub Pages。</p>
        <p><a href="index.html">← 返回首页</a></p>
    </div>

    <script>
        // 首页链接
        document.getElementById('homeLink')?.addEventListener('click', () => {
            window.location.href = 'index.html';
        });
        // 主题切换
        const toggle = document.querySelector('.theme-toggle');
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.body.classList.add('light');
            toggle.textContent = '🌙';
        } else {
            document.body.classList.remove('light');
            toggle.textContent = '☀️';
        }
        toggle.addEventListener('click', () => {
            const isLight = document.body.classList.toggle('light');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            toggle.textContent = isLight ? '🌙' : '☀️';
        });
    </script>
</body>
</html>

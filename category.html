<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类 - SParks 的书架</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            transition: all 0.3s ease;
        }

        body {
            background-color: #6b7b76;
            background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 4px);
            color: #f0ebe5;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        body.light {
            background-color: #f5f1e9;
            background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.02) 0px, rgba(0,0,0,0.02) 1px, transparent 1px, transparent 4px);
            color: #2c2c2c;
        }

        .fixed-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: inherit;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
            border-radius: 0 0 8px 8px;
            gap: 20px;
            flex-wrap: wrap;
        }
        body.light .header {
            background-color: rgba(255, 255, 255, 0.7);
        }

        .header-title {
            font-size: 20px;
            font-weight: 500;
            cursor: pointer;
        }

        .header-nav {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .header-nav a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
        }
        body.light .header-nav a {
            color: #333;
        }

        .search-box {
            display: flex;
            align-items: center;
        }
        .search-box input {
            background-color: rgba(0, 0, 0, 0.2);
            border: none;
            border-radius: 20px;
            padding: 6px 12px;
            color: #fff;
            font-size: 13px;
            outline: none;
            width: 140px;
        }
        body.light .search-box input {
            background-color: rgba(255, 255, 255, 0.5);
            color: #333;
        }
        .search-box input::placeholder {
            color: #ccc;
        }

        .theme-toggle {
            cursor: pointer;
            font-size: 16px;
            margin-left: 5px;
        }

        .category-bar {
            position: sticky;
            top: 52px;
            z-index: 99;
            background-color: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(4px);
            padding: 8px 20px;
            display: flex;
            gap: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        body.light .category-bar {
            background-color: rgba(255, 255, 255, 0.5);
            border-bottom-color: rgba(0,0,0,0.08);
        }
        .category-tab {
            padding: 6px 12px;
            background-color: rgba(0,0,0,0.2);
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        body.light .category-tab {
            background-color: rgba(0,0,0,0.05);
            color: #333;
        }
        .category-tab.active {
            background-color: #ff6b35;
            color: #fff;
        }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .sidebar {
            width: 260px;
            background-color: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(4px);
            height: 100%;
            overflow-y: auto;
            border-right: 1px solid rgba(255,255,255,0.08);
        }
        body.light .sidebar {
            background-color: rgba(255, 255, 255, 0.5);
            border-right: 1px solid rgba(0,0,0,0.08);
        }
        .sidebar-filters {
            padding: 15px;
        }
        .filter-group {
            margin-bottom: 20px;
        }
        .filter-group-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            padding: 6px 0;
            font-weight: 500;
            color: #ff6b35;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 8px;
        }
        body.light .filter-group-header {
            border-bottom-color: rgba(0,0,0,0.1);
        }
        .filter-group-header span:first-child {
            font-size: 14px;
        }
        .filter-group-header span:last-child {
            font-size: 12px;
            opacity: 0.7;
        }
        .filter-tags {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 8px;
        }
        .filter-tag {
            padding: 6px 10px;
            background-color: rgba(0,0,0,0.2);
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        body.light .filter-tag {
            background-color: rgba(0,0,0,0.05);
            color: #333;
        }
        /* 修复白天模式选中样式 */
        .filter-tag.active {
            background-color: #ff6b35 !important;
            color: #fff !important;
        }
        .filter-group.collapsed .filter-tags {
            display: none;
        }

        .main {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .book-item {
            display: flex;
            gap: 20px;
            background-color: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(4px);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        body.light .book-item {
            background-color: rgba(255, 255, 255, 0.5);
            border-color: rgba(0,0,0,0.08);
        }
        .book-cover {
            width: 100px;
            height: 140px;
            object-fit: cover;
            border-radius: 4px;
            background-color: #ccc;
        }
        .book-info {
            flex: 1;
        }
        .book-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .book-author {
            font-size: 13px;
            color: #d1c9c0;
            margin-bottom: 6px;
        }
        body.light .book-author {
            color: #666;
        }
        .book-desc {
            font-size: 13px;
            line-height: 1.5;
            color: #e0d8d0;
        }
        body.light .book-desc {
            color: #444;
        }
        .empty-msg {
            text-align: center;
            padding: 40px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="fixed-header">
        <div class="header">
            <div class="header-title" id="homeLink">SParks 的书架</div>
            <div class="header-nav">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索标题或作者...">
                </div>
                <a href="#">搜书</a>
                <a href="category.html">分类</a>
                <a href="about.html">关于</a>
                <span class="theme-toggle" id="themeBtn">☀️</span>
            </div>
        </div>
        <div class="category-bar" id="categoryBar">
            <div class="category-tab" data-category="all">所有</div>
            <div class="category-tab" data-category="notes">常规笔记</div>
            <div class="category-tab" data-category="resources">常规资源</div>
            <div class="category-tab" data-category="regularPlan">正规计划</div>
            <div class="category-tab" data-category="minorCourses">辅修课程</div>
        </div>
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <div class="sidebar-filters" id="sidebarFilters"></div>
        </div>
        <div class="main" id="contentArea"></div>
    </div>

    <script src="data.js"></script>
    <script>
        (function() {
            if (!window.SITE_DATA) {
                console.error('数据文件未加载');
                document.getElementById('contentArea').innerHTML = '<div class="empty-msg">数据加载失败</div>';
                return;
            }
            const data = window.SITE_DATA;

            const urlParams = new URLSearchParams(window.location.search);
            let initialCategory = urlParams.get('category');
            const validCategories = ['all', 'notes', 'resources', 'regularPlan', 'minorCourses'];
            if (!initialCategory || !validCategories.includes(initialCategory)) initialCategory = 'all';

            let currentCategory = initialCategory;
            let activeFilters = new Set();
            let searchKeyword = '';

            function getCurrentData() {
                switch(currentCategory) {
                    case 'notes': return data.notes || [];
                    case 'resources': return data.resources || [];
                    case 'regularPlan': return data.regularPlan || [];
                    case 'minorCourses': return data.minorCourses || [];
                    case 'all': return [...(data.notes || []), ...(data.resources || []), ...(data.regularPlan || []), ...(data.minorCourses || [])];
                    default: return [];
                }
            }

            function getGroups() {
                const items = getCurrentData();
                let groups = [];
                if (currentCategory === 'notes' || currentCategory === 'resources') {
                    const authors = new Set(), genres = new Set(), fields = new Set();
                    items.forEach(item => {
                        if (item.author) authors.add(item.author);
                        if (item.genre) genres.add(item.genre);
                        if (item.field) fields.add(item.field);
                    });
                    groups = [
                        { key: 'author', title: '作者', values: [...authors] },
                        { key: 'genre', title: '文体', values: [...genres] },
                        { key: 'field', title: '领域', values: [...fields] }
                    ];
                } else if (currentCategory === 'regularPlan' || currentCategory === 'minorCourses') {
                    const types = new Set(), specialties = new Set();
                    items.forEach(item => {
                        let type = item.type || '书';
                        types.add(type);
                        let specialty = '';
                        if (item.specialty) specialty = item.specialty;
                        else if (item.tags && Array.isArray(item.tags)) specialty = item.tags[0];
                        else specialty = item.title.split(/\s+/)[0] || '基础';
                        specialties.add(specialty);
                    });
                    groups = [
                        { key: 'type', title: '类型', values: [...types] },
                        { key: 'specialty', title: '专项', values: [...specialties] }
                    ];
                } else if (currentCategory === 'all') {
                    const authors = new Set(), genres = new Set(), fields = new Set();
                    items.forEach(item => {
                        if (item.author) authors.add(item.author);
                        if (item.genre) genres.add(item.genre);
                        if (item.field) fields.add(item.field);
                    });
                    groups = [
                        { key: 'author', title: '作者', values: [...authors] },
                        { key: 'genre', title: '文体', values: [...genres] },
                        { key: 'field', title: '领域', values: [...fields] }
                    ];
                }
                return groups.filter(g => g.values.length > 0);
            }

            function renderSidebar() {
                const groups = getGroups();
                const sidebar = document.getElementById('sidebarFilters');
                if (!sidebar) return;
                if (groups.length === 0) {
                    sidebar.innerHTML = '<div style="padding:20px;">无筛选标签</div>';
                    return;
                }
                let html = '';
                groups.forEach(group => {
                    html += `<div class="filter-group" data-group-key="${group.key}">
                                <div class="filter-group-header"><span>${group.title}</span><span>▼</span></div>
                                <div class="filter-tags">`;
                    group.values.forEach(value => {
                        const filterId = `${group.key}|${value}`;
                        const active = activeFilters.has(filterId) ? 'active' : '';
                        html += `<div class="filter-tag ${active}" data-group="${group.key}" data-value="${value}">${value}</div>`;
                    });
                    html += `</div></div>`;
                });
                sidebar.innerHTML = html;

                document.querySelectorAll('.filter-group-header').forEach(header => {
                    header.addEventListener('click', (e) => {
                        const groupDiv = header.closest('.filter-group');
                        groupDiv.classList.toggle('collapsed');
                        const arrow = header.querySelector('span:last-child');
                        if (arrow) arrow.textContent = groupDiv.classList.contains('collapsed') ? '▶' : '▼';
                    });
                });

                document.querySelectorAll('.filter-tag').forEach(tag => {
                    tag.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const group = tag.dataset.group;
                        const value = tag.dataset.value;
                        const filterId = `${group}|${value}`;
                        if (activeFilters.has(filterId)) activeFilters.delete(filterId);
                        else activeFilters.add(filterId);
                        renderSidebar();
                        renderContent();
                    });
                });
            }

            function filterByKeyword(items) {
                if (!searchKeyword.trim()) return items;
                const keyword = searchKeyword.toLowerCase();
                return items.filter(item => (item.title && item.title.toLowerCase().includes(keyword)) || (item.author && item.author.toLowerCase().includes(keyword)));
            }

            function filterBySidebar(items) {
                if (activeFilters.size === 0) return items;
                return items.filter(item => {
                    for (let filterId of activeFilters) {
                        const [type, value] = filterId.split('|');
                        let match = false;
                        if (type === 'author') match = (item.author === value);
                        else if (type === 'genre') match = (item.genre === value);
                        else if (type === 'field') match = (item.field === value);
                        else if (type === 'type') match = ((item.type || '书') === value);
                        else if (type === 'specialty') {
                            let itemSpecialty = '';
                            if (item.specialty) itemSpecialty = item.specialty;
                            else if (item.tags && item.tags.length) itemSpecialty = item.tags[0];
                            else itemSpecialty = item.title.split(/\s+/)[0] || '基础';
                            match = (itemSpecialty === value);
                        }
                        if (!match) return false;
                    }
                    return true;
                });
            }

            function renderContent() {
                let items = getCurrentData();
                items = filterBySidebar(items);
                items = filterByKeyword(items);
                const container = document.getElementById('contentArea');
                if (items.length === 0) {
                    container.innerHTML = '<div class="empty-msg">暂无内容</div>';
                    return;
                }
                let html = '';
                items.forEach(item => {
                    const coverUrl = item.cover || 'https://p1.ssl.qhimg.com/t01d4a0a0e0a8a8a8a8.jpg';
                    const link = item.link || '#';
                    const target = (currentCategory === 'resources') ? ' target="_blank"' : '';
                    html += `<div class="book-item">
                                <img class="book-cover" src="${coverUrl}" alt="${item.title}">
                                <div class="book-info">
                                    <a href="${link}"${target} class="book-title" style="color:inherit; text-decoration:none;">${item.title}</a>
                                    <div class="book-author">${item.author || '佚名'}</div>
                                    ${item.desc ? `<div class="book-desc">${item.desc}</div>` : ''}
                                </div>
                            </div>`;
                });
                container.innerHTML = html;
            }

            function switchCategory(category) {
                currentCategory = category;
                activeFilters.clear();
                searchKeyword = '';
                document.getElementById('searchInput').value = '';
                document.querySelectorAll('.category-tab').forEach(tab => {
                    if (tab.dataset.category === category) tab.classList.add('active');
                    else tab.classList.remove('active');
                });
                renderSidebar();
                renderContent();
            }

            function initSearch() {
                const searchInput = document.getElementById('searchInput');
                searchInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        searchKeyword = searchInput.value;
                        renderContent();
                    }
                });
            }

            function init() {
                document.querySelectorAll('.category-tab').forEach(tab => {
                    tab.addEventListener('click', () => switchCategory(tab.dataset.category));
                });
                document.getElementById('homeLink').addEventListener('click', () => window.location.href = 'index.html');
                switchCategory(initialCategory);
                initSearch();
            }
            init();

            const themeBtn = document.getElementById('themeBtn');
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light');
                themeBtn.textContent = '🌙';
            } else {
                document.body.classList.remove('light');
                themeBtn.textContent = '☀️';
            }
            themeBtn.addEventListener('click', () => {
                const isLight = document.body.classList.toggle('light');
                localStorage.setItem('theme', isLight ? 'light' : 'dark');
                themeBtn.textContent = isLight ? '🌙' : '☀️';
            });
        })();
    </script>
</body>
</html>

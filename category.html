<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类 - SParks 的书架</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            transition: all 0.3s ease;
        }

        /* 黑夜模式 */
        body {
            background-color: #6b7b76;
            background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 4px);
            color: #f0ebe5;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 白天模式 */
        body.light {
            background-color: #f5f1e9;
            background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.02) 0px, rgba(0,0,0,0.02) 1px, transparent 1px, transparent 4px);
            color: #2c2c2c;
        }

        /* 固定头部容器 */
        .fixed-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: inherit;
        }

        /* 第一行：标准头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
            border-radius: 0 0 8px 8px;
            margin-bottom: 0;
        }
        body.light .header {
            background-color: rgba(255, 255, 255, 0.7);
        }
        .header-title {
            font-size: 20px;
            font-weight: 500;
            cursor: pointer;
        }
        .header-nav {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .header-nav a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
        }
        body.light .header-nav a {
            color: #333;
        }
        .theme-toggle {
            cursor: pointer;
            font-size: 16px;
            margin-left: 10px;
        }

        /* 第二行：类别切换栏 */
        .category-bar {
            position: sticky;
            top: 52px; /* 头部高度约52px，根据实际微调 */
            z-index: 99;
            background-color: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(4px);
            padding: 8px 20px;
            display: flex;
            gap: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        body.light .category-bar {
            background-color: rgba(255, 255, 255, 0.5);
            border-bottom-color: rgba(0,0,0,0.08);
        }
        .category-tab {
            padding: 6px 12px;
            background-color: rgba(0,0,0,0.2);
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        body.light .category-tab {
            background-color: rgba(0,0,0,0.05);
            color: #333;
        }
        .category-tab.active {
            background-color: #ff6b35;
            color: #fff;
        }

        /* 侧边栏 + 主内容区布局 */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .sidebar {
            width: 260px;
            background-color: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(4px);
            height: 100%;
            overflow-y: auto;
            border-right: 1px solid rgba(255,255,255,0.08);
        }
        body.light .sidebar {
            background-color: rgba(255, 255, 255, 0.5);
            border-right: 1px solid rgba(0,0,0,0.08);
        }
        .sidebar-header {
            padding: 20px;
            font-size: 22px;
            font-weight: 500;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        body.light .sidebar-header {
            border-bottom-color: rgba(0,0,0,0.1);
        }
        .sidebar-filters {
            padding: 15px;
        }
        .filter-group {
            margin-bottom: 20px;
        }
        .filter-group-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
            color: #ff6b35;
        }
        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .filter-tag {
            padding: 4px 10px;
            background-color: rgba(0,0,0,0.2);
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        body.light .filter-tag {
            background-color: rgba(0,0,0,0.05);
            color: #333;
        }
        .filter-tag.active {
            background-color: #ff6b35;
            color: #fff;
        }
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .book-item {
            display: flex;
            gap: 20px;
            background-color: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(4px);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        body.light .book-item {
            background-color: rgba(255, 255, 255, 0.5);
            border-color: rgba(0,0,0,0.08);
        }
        .book-cover {
            width: 100px;
            height: 140px;
            object-fit: cover;
            border-radius: 4px;
            background-color: #ccc;
        }
        .book-info {
            flex: 1;
        }
        .book-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .book-author {
            font-size: 13px;
            color: #d1c9c0;
            margin-bottom: 6px;
        }
        body.light .book-author {
            color: #666;
        }
        .book-desc {
            font-size: 13px;
            line-height: 1.5;
            color: #e0d8d0;
        }
        body.light .book-desc {
            color: #444;
        }
        .empty-msg {
            text-align: center;
            padding: 40px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="fixed-header">
        <div class="header">
            <div class="header-title" id="homeLink">SParks 的书架</div>
            <div class="header-nav">
                <a href="#">搜书</a>
                <a href="category.html">分类</a>
                <a href="about.html">关于</a>
                <span class="theme-toggle" id="themeBtn">☀️</span>
            </div>
        </div>
        <div class="category-bar" id="categoryBar">
            <div class="category-tab" data-category="notes">常规笔记</div>
            <div class="category-tab" data-category="resources">常规资源</div>
            <div class="category-tab" data-category="regularPlan">正规计划</div>
            <div class="category-tab" data-category="minorCourses">辅修课程</div>
        </div>
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <div class="sidebar-header">SParks 的书架</div>
            <div class="sidebar-filters" id="sidebarFilters">
                <!-- 动态生成筛选标签 -->
            </div>
        </div>
        <div class="main" id="contentArea">
            <!-- 动态内容列表 -->
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        (function() {
            if (!window.SITE_DATA) {
                console.error('数据文件未加载');
                document.getElementById('contentArea').innerHTML = '<div class="empty-msg">数据加载失败</div>';
                return;
            }
            const data = window.SITE_DATA;

            let currentCategory = 'notes';
            let currentFilter = { type: null, value: null };

            function getCurrentData() {
                switch(currentCategory) {
                    case 'notes': return data.notes || [];
                    case 'resources': return data.resources || [];
                    case 'regularPlan': return data.regularPlan || [];
                    case 'minorCourses': return data.minorCourses || [];
                    default: return [];
                }
            }

            function getFiltersFromData(items) {
                const authors = new Set();
                const genres = new Set();
                const fields = new Set();
                items.forEach(item => {
                    if (item.author) authors.add(item.author);
                    if (item.genre) genres.add(item.genre);
                    if (item.field) fields.add(item.field);
                });
                return { authors: [...authors], genres: [...genres], fields: [...fields] };
            }

            function filterData(items) {
                if (!currentFilter.type || !currentFilter.value) return items;
                return items.filter(item => {
                    if (currentFilter.type === 'author') return item.author === currentFilter.value;
                    if (currentFilter.type === 'genre') return item.genre === currentFilter.value;
                    if (currentFilter.type === 'field') return item.field === currentFilter.value;
                    return true;
                });
            }

            function renderSidebar() {
                const items = getCurrentData();
                const { authors, genres, fields } = getFiltersFromData(items);
                const sidebar = document.getElementById('sidebarFilters');
                let html = '';
                if (authors.length) {
                    html += `<div class="filter-group">
                                <div class="filter-group-title">📝 作者</div>
                                <div class="filter-tags" data-type="author">`;
                    authors.forEach(author => {
                        const active = (currentFilter.type === 'author' && currentFilter.value === author) ? 'active' : '';
                        html += `<span class="filter-tag ${active}" data-type="author" data-value="${author}">${author}</span>`;
                    });
                    html += `</div></div>`;
                }
                if (genres.length) {
                    html += `<div class="filter-group">
                                <div class="filter-group-title">📖 文体</div>
                                <div class="filter-tags" data-type="genre">`;
                    genres.forEach(genre => {
                        const active = (currentFilter.type === 'genre' && currentFilter.value === genre) ? 'active' : '';
                        html += `<span class="filter-tag ${active}" data-type="genre" data-value="${genre}">${genre}</span>`;
                    });
                    html += `</div></div>`;
                }
                if (fields.length) {
                    html += `<div class="filter-group">
                                <div class="filter-group-title">🌐 领域</div>
                                <div class="filter-tags" data-type="field">`;
                    fields.forEach(field => {
                        const active = (currentFilter.type === 'field' && currentFilter.value === field) ? 'active' : '';
                        html += `<span class="filter-tag ${active}" data-type="field" data-value="${field}">${field}</span>`;
                    });
                    html += `</div></div>`;
                }
                sidebar.innerHTML = html || '<div style="padding:20px;">无筛选标签</div>';

                document.querySelectorAll('.filter-tag').forEach(tag => {
                    tag.addEventListener('click', (e) => {
                        const type = tag.dataset.type;
                        const value = tag.dataset.value;
                        if (currentFilter.type === type && currentFilter.value === value) {
                            currentFilter = { type: null, value: null };
                        } else {
                            currentFilter = { type, value };
                        }
                        renderSidebar();
                        renderContent();
                    });
                });
            }

            function renderContent() {
                let items = getCurrentData();
                items = filterData(items);
                const container = document.getElementById('contentArea');
                if (items.length === 0) {
                    container.innerHTML = '<div class="empty-msg">暂无内容</div>';
                    return;
                }
                let html = '';
                items.forEach(item => {
                    const coverUrl = item.cover || 'https://p1.ssl.qhimg.com/t01d4a0a0e0a8a8a8a8.jpg';
                    const link = item.link || '#';
                    const target = (currentCategory === 'resources') ? ' target="_blank"' : '';
                    html += `
                        <div class="book-item">
                            <img class="book-cover" src="${coverUrl}" alt="${item.title}">
                            <div class="book-info">
                                <a href="${link}"${target} class="book-title" style="color:inherit; text-decoration:none;">${item.title}</a>
                                <div class="book-author">${item.author || '佚名'}</div>
                                ${item.desc ? `<div class="book-desc">${item.desc}</div>` : ''}
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            }

            function switchCategory(category) {
                currentCategory = category;
                currentFilter = { type: null, value: null };
                document.querySelectorAll('.category-tab').forEach(tab => {
                    if (tab.dataset.category === category) {
                        tab.classList.add('active');
                    } else {
                        tab.classList.remove('active');
                    }
                });
                renderSidebar();
                renderContent();
            }

            function init() {
                document.querySelectorAll('.category-tab').forEach(tab => {
                    tab.addEventListener('click', () => switchCategory(tab.dataset.category));
                });
                document.getElementById('homeLink').addEventListener('click', () => window.location.href = 'index.html');
                switchCategory('notes');
            }
            init();

            // 主题切换
            const themeBtn = document.getElementById('themeBtn');
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light');
                themeBtn.textContent = '🌙';
            } else {
                document.body.classList.remove('light');
                themeBtn.textContent = '☀️';
            }
            themeBtn.addEventListener('click', () => {
                const isLight = document.body.classList.toggle('light');
                localStorage.setItem('theme', isLight ? 'light' : 'dark');
                themeBtn.textContent = isLight ? '🌙' : '☀️';
            });
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类 - SParks 的书架</title>
    <style>
        /* 原有样式保持不变，此处省略，实际使用请保留完整样式 */
        /* 与上一版本完全相同，仅修改 JS 部分 */
    </style>
</head>
<body>
    <div class="fixed-header">
        <div class="header">
            <div class="header-title" id="homeLink">SParks 的书架</div>
            <div class="header-nav">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索标题或作者...">
                </div>
                <a href="#">搜书</a>
                <a href="category.html">分类</a>
                <a href="about.html">关于</a>
                <span class="theme-toggle" id="themeBtn">☀️</span>
            </div>
        </div>
        <div class="category-bar" id="categoryBar">
            <div class="category-tab" data-category="all">所有</div>
            <div class="category-tab" data-category="notes">常规笔记</div>
            <div class="category-tab" data-category="resources">常规资源</div>
            <div class="category-tab" data-category="regularPlan">正规计划</div>
            <div class="category-tab" data-category="minorCourses">辅修课程</div>
        </div>
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <div class="sidebar-filters" id="sidebarFilters"></div>
        </div>
        <div class="main" id="contentArea"></div>
    </div>

    <script src="data.js"></script>
    <script>
        (function() {
            if (!window.SITE_DATA) {
                console.error('数据文件未加载');
                document.getElementById('contentArea').innerHTML = '<div class="empty-msg">数据加载失败</div>';
                return;
            }
            const data = window.SITE_DATA;

            // 获取 URL 参数
            const urlParams = new URLSearchParams(window.location.search);
            let initialCategory = urlParams.get('category');
            const validCategories = ['all', 'notes', 'resources', 'regularPlan', 'minorCourses'];
            if (!initialCategory || !validCategories.includes(initialCategory)) {
                initialCategory = 'all';
            }

            let currentCategory = initialCategory;
            let activeFilters = new Set(); // 多选存储
            let searchKeyword = '';

            // ---------- 辅助函数 ----------
            function getCurrentData() {
                switch(currentCategory) {
                    case 'notes': return data.notes || [];
                    case 'resources': return data.resources || [];
                    case 'regularPlan': return data.regularPlan || [];
                    case 'minorCourses': return data.minorCourses || [];
                    case 'all':
                        return [...(data.notes || []), ...(data.resources || []), ...(data.regularPlan || []), ...(data.minorCourses || [])];
                    default: return [];
                }
            }

            function getGroups() {
                const items = getCurrentData();
                let groups = [];
                if (currentCategory === 'notes' || currentCategory === 'resources') {
                    const authors = new Set();
                    const genres = new Set();
                    const fields = new Set();
                    items.forEach(item => {
                        if (item.author) authors.add(item.author);
                        if (item.genre) genres.add(item.genre);
                        if (item.field) fields.add(item.field);
                    });
                    groups = [
                        { key: 'author', title: '作者', values: [...authors] },
                        { key: 'genre', title: '文体', values: [...genres] },
                        { key: 'field', title: '领域', values: [...fields] }
                    ];
                } 
                else if (currentCategory === 'regularPlan' || currentCategory === 'minorCourses') {
                    const types = new Set();
                    const specialties = new Set();
                    items.forEach(item => {
                        let type = item.type || '书';
                        types.add(type);
                        let specialty = '';
                        if (item.specialty) specialty = item.specialty;
                        else if (item.tags && Array.isArray(item.tags)) specialty = item.tags[0];
                        else specialty = item.title.split(/\s+/)[0] || '基础';
                        specialties.add(specialty);
                    });
                    groups = [
                        { key: 'type', title: '类型', values: [...types] },
                        { key: 'specialty', title: '专项', values: [...specialties] }
                    ];
                }
                else if (currentCategory === 'all') {
                    const authors = new Set();
                    const genres = new Set();
                    const fields = new Set();
                    items.forEach(item => {
                        if (item.author) authors.add(item.author);
                        if (item.genre) genres.add(item.genre);
                        if (item.field) fields.add(item.field);
                    });
                    groups = [
                        { key: 'author', title: '作者', values: [...authors] },
                        { key: 'genre', title: '文体', values: [...genres] },
                        { key: 'field', title: '领域', values: [...fields] }
                    ];
                }
                return groups.filter(g => g.values.length > 0);
            }

            function renderSidebar() {
                const groups = getGroups();
                const sidebar = document.getElementById('sidebarFilters');
                if (!sidebar) return;
                if (groups.length === 0) {
                    sidebar.innerHTML = '<div style="padding:20px;">无筛选标签</div>';
                    return;
                }
                let html = '';
                groups.forEach(group => {
                    html += `
                        <div class="filter-group" data-group-key="${group.key}">
                            <div class="filter-group-header">
                                <span>${group.title}</span>
                                <span>▼</span>
                            </div>
                            <div class="filter-tags">
                    `;
                    group.values.forEach(value => {
                        const filterId = `${group.key}|${value}`;
                        const active = activeFilters.has(filterId) ? 'active' : '';
                        html += `<div class="filter-tag ${active}" data-group="${group.key}" data-value="${value}">${value}</div>`;
                    });
                    html += `</div></div>`;
                });
                sidebar.innerHTML = html;

                // 折叠/展开
                document.querySelectorAll('.filter-group-header').forEach(header => {
                    header.addEventListener('click', (e) => {
                        const groupDiv = header.closest('.filter-group');
                        groupDiv.classList.toggle('collapsed');
                        const arrow = header.querySelector('span:last-child');
                        if (arrow) arrow.textContent = groupDiv.classList.contains('collapsed') ? '▶' : '▼';
                    });
                });

                // 多选标签点击
                document.querySelectorAll('.filter-tag').forEach(tag => {
                    tag.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const group = tag.dataset.group;
                        const value = tag.dataset.value;
                        const filterId = `${group}|${value}`;
                        if (activeFilters.has(filterId)) {
                            activeFilters.delete(filterId);
                        } else {
                            activeFilters.add(filterId);
                        }
                        renderSidebar();
                        renderContent();
                    });
                });
            }

            function filterByKeyword(items) {
                if (!searchKeyword.trim()) return items;
                const keyword = searchKeyword.toLowerCase();
                return items.filter(item => {
                    return (item.title && item.title.toLowerCase().includes(keyword)) ||
                           (item.author && item.author.toLowerCase().includes(keyword));
                });
            }

            function filterBySidebar(items) {
                if (activeFilters.size === 0) return items;
                return items.filter(item => {
                    for (let filterId of activeFilters) {
                        const [type, value] = filterId.split('|');
                        let match = false;
                        if (type === 'author') match = (item.author === value);
                        else if (type === 'genre') match = (item.genre === value);
                        else if (type === 'field') match = (item.field === value);
                        else if (type === 'type') match = ((item.type || '书') === value);
                        else if (type === 'specialty') {
                            let itemSpecialty = '';
                            if (item.specialty) itemSpecialty = item.specialty;
                            else if (item.tags && item.tags.length) itemSpecialty = item.tags[0];
                            else itemSpecialty = item.title.split(/\s+/)[0] || '基础';
                            match = (itemSpecialty === value);
                        }
                        if (!match) return false;
                    }
                    return true;
                });
            }

            function renderContent() {
                let items = getCurrentData();
                items = filterBySidebar(items);
                items = filterByKeyword(items);
                const container = document.getElementById('contentArea');
                if (items.length === 0) {
                    container.innerHTML = '<div class="empty-msg">暂无内容</div>';
                    return;
                }
                let html = '';
                items.forEach(item => {
                    const coverUrl = item.cover || 'https://p1.ssl.qhimg.com/t01d4a0a0e0a8a8a8a8.jpg';
                    const link = item.link || '#';
                    const target = (currentCategory === 'resources') ? ' target="_blank"' : '';
                    html += `
                        <div class="book-item">
                            <a href="${link}"${target} style="text-decoration: none; display: block;">
                                <img class="book-cover" src="${coverUrl}" alt="${item.title}">
                            </a>
                            <div class="book-info">
                                <a href="${link}"${target} class="book-title" style="color:inherit; text-decoration:none;">${item.title}</a>
                                <div class="book-author">${item.author || '佚名'}</div>
                                ${item.desc ? `<div class="book-desc">${item.desc}</div>` : ''}
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            }

            function switchCategory(category) {
                currentCategory = category;
                activeFilters.clear();
                searchKeyword = '';
                document.getElementById('searchInput').value = '';
                document.querySelectorAll('.category-tab').forEach(tab => {
                    if (tab.dataset.category === category) {
                        tab.classList.add('active');
                    } else {
                        tab.classList.remove('active');
                    }
                });
                renderSidebar();
                renderContent();
            }

            function initSearch() {
                const searchInput = document.getElementById('searchInput');
                searchInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        searchKeyword = searchInput.value;
                        renderContent();
                    }
                });
            }

            function init() {
                document.querySelectorAll('.category-tab').forEach(tab => {
                    tab.addEventListener('click', () => switchCategory(tab.dataset.category));
                });
                document.getElementById('homeLink').addEventListener('click', () => window.location.href = 'index.html');
                switchCategory(initialCategory);
                initSearch();
            }
            init();

            // 主题切换
            const themeBtn = document.getElementById('themeBtn');
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light');
                themeBtn.textContent = '🌙';
            } else {
                document.body.classList.remove('light');
                themeBtn.textContent = '☀️';
            }
            themeBtn.addEventListener('click', () => {
                const isLight = document.body.classList.toggle('light');
                localStorage.setItem('theme', isLight ? 'light' : 'dark');
                themeBtn.textContent = isLight ? '🌙' : '☀️';
            });
        })();
    </script>
</body>
</html>

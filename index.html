<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SParks 的书架</title>
    <style>
        /* 样式与原 index.html 完全相同，此处省略以节省篇幅，实际请使用之前完整的样式 */
        /* 注意：.book-list 需改为 flex-wrap: wrap; 实现换行 */
        .book-list { display: flex; flex-wrap: wrap; gap: 20px; justify-content: flex-start; }
        .book-item { width: 160px; margin-bottom: 20px; }
        /* 其他样式不变 */
    </style>
</head>
<body>
    <!-- 固定顶部区域、筛选标签等 HTML 结构保持不变，请参考之前的完整版本 -->
    ...
    <script src="data.js"></script>
    <script>
        (function() {
            if (!window.SITE_DATA) { console.error('数据文件未加载'); return; }
            const data = window.SITE_DATA;

            // 常规大类筛选（不变，略）
            let regularActiveFilters = new Set();
            // ... 常规部分的函数保持不变 ...

            // ---------- 画画大类筛选（增加作者） ----------
            let drawingActiveFilters = new Set();

            function getAllDrawingItems() {
                return [...(data.regularPlan || []), ...(data.minorCourses || [])];
            }

            function getDrawingTagOptions() {
                const authors = new Set();
                const types = new Set();
                const specialties = new Set();
                const allItems = getAllDrawingItems();
                allItems.forEach(item => {
                    if (item.author) authors.add(item.author);
                    let type = item.type || '书';
                    types.add(type);
                    let specialty = '';
                    if (item.specialty) specialty = item.specialty;
                    else if (item.tags && Array.isArray(item.tags) && item.tags.length) specialty = item.tags[0];
                    else specialty = item.title.split(/\s+/)[0] || '基础';
                    specialties.add(specialty);
                });
                // 确保至少有一个默认
                if (types.size === 0) types.add('书');
                if (specialties.size === 0) specialties.add('基础');
                return { authors: [...authors], types: [...types], specialties: [...specialties] };
            }

            function renderDrawingFilters() {
                const { authors, types, specialties } = getDrawingTagOptions();
                const container = document.getElementById('drawingFilterTags');
                if (!container) return;

                let html = '';
                // 作者行
                if (authors.length) {
                    html += `<div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; width: 100%; margin-bottom: 8px;">`;
                    authors.forEach(author => {
                        const filterId = `author|${author}`;
                        const active = drawingActiveFilters.has(filterId) ? 'active' : '';
                        html += `<span class="tag ${active}" data-type="author" data-value="${author}">${author}</span>`;
                    });
                    html += `</div>`;
                }
                // 类型行
                if (types.length) {
                    html += `<div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; width: 100%; margin-bottom: 8px;">`;
                    types.forEach(type => {
                        const filterId = `type|${type}`;
                        const active = drawingActiveFilters.has(filterId) ? 'active' : '';
                        html += `<span class="tag ${active}" data-type="type" data-value="${type}">${type}</span>`;
                    });
                    html += `</div>`;
                }
                // 专项行
                if (specialties.length) {
                    html += `<div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; width: 100%;">`;
                    specialties.forEach(specialty => {
                        const filterId = `specialty|${specialty}`;
                        const active = drawingActiveFilters.has(filterId) ? 'active' : '';
                        html += `<span class="tag ${active}" data-type="specialty" data-value="${specialty}">${specialty}</span>`;
                    });
                    html += `</div>`;
                }
                container.innerHTML = html;

                document.querySelectorAll('#drawingFilterTags .tag').forEach(tag => {
                    tag.addEventListener('click', (e) => {
                        const type = tag.dataset.type;
                        const value = tag.dataset.value;
                        const filterId = `${type}|${value}`;
                        if (drawingActiveFilters.has(filterId)) {
                            drawingActiveFilters.delete(filterId);
                        } else {
                            drawingActiveFilters.add(filterId);
                        }
                        renderDrawingFilters();
                        renderDrawingContent();
                    });
                });
            }

            function filterDrawingItems(items) {
                if (drawingActiveFilters.size === 0) return items;
                return items.filter(item => {
                    for (let filterId of drawingActiveFilters) {
                        const [type, value] = filterId.split('|');
                        if (type === 'author') {
                            if (item.author !== value) return false;
                        } else if (type === 'type') {
                            const itemType = item.type || '书';
                            if (itemType !== value) return false;
                        } else if (type === 'specialty') {
                            let itemSpecialty = '';
                            if (item.specialty) itemSpecialty = item.specialty;
                            else if (item.tags && Array.isArray(item.tags) && item.tags.length) itemSpecialty = item.tags[0];
                            else itemSpecialty = item.title.split(/\s+/)[0] || '基础';
                            if (itemSpecialty !== value) return false;
                        }
                    }
                    return true;
                });
            }

            function renderDrawingContent() {
                const allItems = getAllDrawingItems();
                const filtered = filterDrawingItems(allItems);
                const regularPlanFiltered = filtered.filter(item => data.regularPlan.includes(item));
                const minorCoursesFiltered = filtered.filter(item => data.minorCourses.includes(item));
                const defaultCover = 'https://p1.ssl.qhimg.com/t01d4a0a0e0a8a8a8a8.jpg';

                const regularHtml = regularPlanFiltered.map(book => `
                    <div class="book-item">
                        <img class="book-cover" src="${book.cover || defaultCover}" alt="${book.title}">
                        <a href="${book.link}" class="book-title">${book.title}</a>
                        <div class="book-author">${book.author}</div>
                    </div>
                `).join('');
                document.getElementById('regularPlanContainer').innerHTML = regularHtml || '<div>暂无内容</div>';

                const minorHtml = minorCoursesFiltered.map(book => `
                    <div class="book-item">
                        <img class="book-cover" src="${book.cover || defaultCover}" alt="${book.title}">
                        <a href="${book.link}" class="book-title">${book.title}</a>
                        <div class="book-author">${book.author}</div>
                    </div>
                `).join('');
                document.getElementById('minorCoursesContainer').innerHTML = minorHtml || '<div>暂无内容</div>';
            }

            // 初始化常规部分（略）
            renderRegularFilters();
            renderRegularContent();
            renderDrawingFilters();
            renderDrawingContent();

            // 主题切换等保持不变...
        })();
    </script>
</body>
</html>

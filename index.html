<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SParks 的书架</title>
    <style>
        /* 原有样式保持不变，此处省略以节省篇幅，实际使用请保留原完整样式 */
        /* 与上一版本完全相同，仅修改 JS 部分 */
    </style>
</head>
<body>
    <!-- 固定顶部区域、筛选标签、笔记/资源/画画模块，HTML 结构不变 -->
    <!-- ... 省略，与上一版相同 ... -->

    <script src="data.js"></script>
    <script>
        (function() {
            if (!window.SITE_DATA) {
                console.error('数据文件未加载');
                return;
            }
            const data = window.SITE_DATA;

            // 常规大类筛选（多选）
            let regularActiveFilters = new Set();

            function getRegularTagOptions() {
                const authors = new Set();
                const genres = new Set();
                const fields = new Set();
                [...data.notes, ...data.resources].forEach(item => {
                    if (item.author) authors.add(item.author);
                    if (item.genre) genres.add(item.genre);
                    if (item.field) fields.add(item.field);
                });
                return { authors: [...authors], genres: [...genres], fields: [...fields] };
            }

            function renderRegularFilters() {
                const { authors, genres, fields } = getRegularTagOptions();
                const container = document.getElementById('regularFilterTags');
                if (!container) return;

                let html = '';
                if (authors.length) {
                    html += `<div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; width: 100%; margin-bottom: 8px;">`;
                    authors.forEach(author => {
                        const filterId = `author|${author}`;
                        const active = regularActiveFilters.has(filterId) ? 'active' : '';
                        html += `<span class="tag ${active}" data-type="author" data-value="${author}">${author}</span>`;
                    });
                    html += `</div>`;
                }
                if (genres.length) {
                    html += `<div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; width: 100%; margin-bottom: 8px;">`;
                    genres.forEach(genre => {
                        const filterId = `genre|${genre}`;
                        const active = regularActiveFilters.has(filterId) ? 'active' : '';
                        html += `<span class="tag ${active}" data-type="genre" data-value="${genre}">${genre}</span>`;
                    });
                    html += `</div>`;
                }
                if (fields.length) {
                    html += `<div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; width: 100%;">`;
                    fields.forEach(field => {
                        const filterId = `field|${field}`;
                        const active = regularActiveFilters.has(filterId) ? 'active' : '';
                        html += `<span class="tag ${active}" data-type="field" data-value="${field}">${field}</span>`;
                    });
                    html += `</div>`;
                }
                container.innerHTML = html;

                document.querySelectorAll('#regularFilterTags .tag').forEach(tag => {
                    tag.addEventListener('click', (e) => {
                        const type = tag.dataset.type;
                        const value = tag.dataset.value;
                        const filterId = `${type}|${value}`;
                        if (regularActiveFilters.has(filterId)) {
                            regularActiveFilters.delete(filterId);
                        } else {
                            regularActiveFilters.add(filterId);
                        }
                        renderRegularFilters();
                        renderRegularContent();
                    });
                });
            }

            function filterRegularItems(items) {
                if (regularActiveFilters.size === 0) return items;
                return items.filter(item => {
                    for (let filterId of regularActiveFilters) {
                        const [type, value] = filterId.split('|');
                        if (type === 'author' && item.author !== value) return false;
                        if (type === 'genre' && item.genre !== value) return false;
                        if (type === 'field' && item.field !== value) return false;
                    }
                    return true;
                });
            }

            function renderRegularContent() {
                const filteredNotes = filterRegularItems(data.notes);
                const filteredResources = filterRegularItems(data.resources);
                const defaultCover = 'https://p1.ssl.qhimg.com/t01d4a0a0e0a8a8a8a8.jpg';

                const notesHtml = filteredNotes.map(note => `
                    <div class="book-item">
                        <a href="${note.link}" style="text-decoration: none; display: block;">
                            <img class="book-cover" src="${note.cover || defaultCover}" alt="${note.title}">
                        </a>
                        <a href="${note.link}" class="book-title">${note.title}</a>
                        <div class="book-author">${note.author}</div>
                    </div>
                `).join('');
                document.getElementById('notesContainer').innerHTML = notesHtml || '<div>暂无笔记</div>';

                const resourcesHtml = filteredResources.map(res => `
                    <div class="book-item">
                        <a href="${res.link}" target="_blank" style="text-decoration: none; display: block;">
                            <img class="book-cover" src="${res.cover || defaultCover}" alt="${res.title}">
                        </a>
                        <a href="${res.link}" target="_blank" class="book-title">${res.title}</a>
                        <div class="book-author">${res.author}</div>
                    </div>
                `).join('');
                document.getElementById('resourcesContainer').innerHTML = resourcesHtml || '<div>暂无资源</div>';
            }

            // 画画大类筛选（多选）
            let drawingActiveFilters = new Set();

            function getAllDrawingItems() {
                return [...(data.regularPlan || []), ...(data.minorCourses || [])];
            }

            function getDrawingTagOptions() {
                const types = new Set();
                const specialties = new Set();
                const allItems = getAllDrawingItems();
                allItems.forEach(item => {
                    let type = item.type || '书';
                    types.add(type);
                    let specialty = '';
                    if (item.specialty) specialty = item.specialty;
                    else if (item.tags && Array.isArray(item.tags) && item.tags.length) specialty = item.tags[0];
                    else specialty = item.title.split(/\s+/)[0] || '基础';
                    specialties.add(specialty);
                });
                if (types.size === 0) types.add('书');
                if (specialties.size === 0) specialties.add('基础');
                return { types: [...types], specialties: [...specialties] };
            }

            function renderDrawingFilters() {
                const { types, specialties } = getDrawingTagOptions();
                const container = document.getElementById('drawingFilterTags');
                if (!container) return;

                let html = '';
                if (types.length) {
                    html += `<div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; width: 100%; margin-bottom: 8px;">`;
                    types.forEach(type => {
                        const filterId = `type|${type}`;
                        const active = drawingActiveFilters.has(filterId) ? 'active' : '';
                        html += `<span class="tag ${active}" data-type="type" data-value="${type}">${type}</span>`;
                    });
                    html += `</div>`;
                }
                if (specialties.length) {
                    html += `<div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; width: 100%;">`;
                    specialties.forEach(specialty => {
                        const filterId = `specialty|${specialty}`;
                        const active = drawingActiveFilters.has(filterId) ? 'active' : '';
                        html += `<span class="tag ${active}" data-type="specialty" data-value="${specialty}">${specialty}</span>`;
                    });
                    html += `</div>`;
                }
                container.innerHTML = html;

                document.querySelectorAll('#drawingFilterTags .tag').forEach(tag => {
                    tag.addEventListener('click', (e) => {
                        const type = tag.dataset.type;
                        const value = tag.dataset.value;
                        const filterId = `${type}|${value}`;
                        if (drawingActiveFilters.has(filterId)) {
                            drawingActiveFilters.delete(filterId);
                        } else {
                            drawingActiveFilters.add(filterId);
                        }
                        renderDrawingFilters();
                        renderDrawingContent();
                    });
                });
            }

            function filterDrawingItems(items) {
                if (drawingActiveFilters.size === 0) return items;
                return items.filter(item => {
                    for (let filterId of drawingActiveFilters) {
                        const [type, value] = filterId.split('|');
                        if (type === 'type') {
                            const itemType = item.type || '书';
                            if (itemType !== value) return false;
                        } else if (type === 'specialty') {
                            let itemSpecialty = '';
                            if (item.specialty) itemSpecialty = item.specialty;
                            else if (item.tags && Array.isArray(item.tags) && item.tags.length) itemSpecialty = item.tags[0];
                            else itemSpecialty = item.title.split(/\s+/)[0] || '基础';
                            if (itemSpecialty !== value) return false;
                        }
                    }
                    return true;
                });
            }

            function renderDrawingContent() {
                const allItems = getAllDrawingItems();
                const filtered = filterDrawingItems(allItems);
                const regularPlanFiltered = filtered.filter(item => data.regularPlan.includes(item));
                const minorCoursesFiltered = filtered.filter(item => data.minorCourses.includes(item));
                const defaultCover = 'https://p1.ssl.qhimg.com/t01d4a0a0e0a8a8a8a8.jpg';

                const regularHtml = regularPlanFiltered.map(book => `
                    <div class="book-item">
                        <a href="${book.link}" style="text-decoration: none; display: block;">
                            <img class="book-cover" src="${book.cover || defaultCover}" alt="${book.title}">
                        </a>
                        <a href="${book.link}" class="book-title">${book.title}</a>
                        <div class="book-author">${book.author}</div>
                    </div>
                `).join('');
                document.getElementById('regularPlanContainer').innerHTML = regularHtml || '<div>暂无内容</div>';

                const minorHtml = minorCoursesFiltered.map(book => `
                    <div class="book-item">
                        <a href="${book.link}" style="text-decoration: none; display: block;">
                            <img class="book-cover" src="${book.cover || defaultCover}" alt="${book.title}">
                        </a>
                        <a href="${book.link}" class="book-title">${book.title}</a>
                        <div class="book-author">${book.author}</div>
                    </div>
                `).join('');
                document.getElementById('minorCoursesContainer').innerHTML = minorHtml || '<div>暂无内容</div>';
            }

            // 初始化
            renderRegularFilters();
            renderRegularContent();
            renderDrawingFilters();
            renderDrawingContent();

            // 主题切换
            const toggle = document.querySelector('.theme-toggle');
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light');
                toggle.textContent = '🌙';
            } else {
                document.body.classList.remove('light');
                toggle.textContent = '☀️';
            }
            toggle.addEventListener('click', () => {
                const isLight = document.body.classList.toggle('light');
                localStorage.setItem('theme', isLight ? 'light' : 'dark');
                toggle.textContent = isLight ? '🌙' : '☀️';
            });

            // 首页链接
            document.getElementById('homeLink').addEventListener('click', () => {
                window.location.href = 'index.html';
            });
        })();
    </script>
</body>
</html>

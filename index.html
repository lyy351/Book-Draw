<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SParks 的书架</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            transition: all 0.3s ease;
        }

        /* 黑夜模式 */
        body {
            background-color: #6b7b76;
            background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 4px);
            color: #ffffff;
            padding: 20px;
        }

        /* 白天模式 */
        body.light {
            background-color: #f0ebe5;
            background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.02) 0px, rgba(0,0,0,0.02) 1px, transparent 1px, transparent 4px);
            color: #333333;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            margin-bottom: 40px;
        }
        body.light .header {
            background-color: rgba(255, 255, 255, 0.7);
        }

        .header-title {
            font-size: 20px;
            font-weight: 500;
            cursor: pointer;
        }
        .header-nav {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .header-nav a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
        }
        body.light .header-nav a {
            color: #333;
        }
        .header-nav a:first-child {
            color: #ff6b35;
            font-weight: 500;
        }

        .quote {
            text-align: center;
            margin-bottom: 30px;
        }
        .quote-text {
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 10px;
        }
        .quote-author {
            font-size: 14px;
            color: #e0e0e0;
        }
        body.light .quote-author {
            color: #666;
        }

        .search-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        .search-input {
            width: 500px;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            background-color: rgba(0, 0, 0, 0.2);
            color: #fff;
            font-size: 14px;
        }
        body.light .search-input {
            background-color: rgba(255, 255, 255, 0.7);
            color: #333;
        }
        .search-input::placeholder {
            color: #ccc;
        }
        .search-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            background-color: #ffffff;
            color: #333333;
            font-size: 14px;
            cursor: pointer;
        }

        /* 大类别容器 */
        .category-section {
            max-width: 1200px;
            margin: 0 auto 60px auto;
            background-color: rgba(0,0,0,0.1);
            border-radius: 16px;
            padding: 20px;
        }
        body.light .category-section {
            background-color: rgba(255,255,255,0.3);
        }
        .category-title {
            font-size: 28px;
            font-weight: 500;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        /* 筛选按钮行 */
        .filter-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .filter-btn {
            padding: 6px 16px;
            background-color: rgba(0,0,0,0.2);
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
        body.light .filter-btn {
            background-color: rgba(255,255,255,0.7);
            color: #333;
        }
        .filter-btn.active {
            background-color: #ff6b35;
            color: #fff;
        }

        /* 子标签行 */
        .subtags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
            padding: 10px 0;
            border-top: 1px solid rgba(255,255,255,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        body.light .subtags {
            border-color: rgba(0,0,0,0.1);
        }
        .subtag {
            padding: 4px 12px;
            background-color: rgba(0,0,0,0.15);
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }
        body.light .subtag {
            background-color: rgba(0,0,0,0.05);
        }
        .subtag.active {
            background-color: #ff6b35;
            color: #fff;
        }

        /* 内容区块通用 */
        .sub-section {
            margin-bottom: 30px;
        }
        .sub-section h3 {
            font-size: 18px;
            margin-bottom: 12px;
            padding-left: 8px;
            border-left: 3px solid #ff6b35;
        }
        .book-list {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        .book-item {
            width: 160px;
            flex-shrink: 0;
        }
        .book-cover {
            width: 100%;
            height: 220px;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            margin-bottom: 8px;
            object-fit: cover;
        }
        body.light .book-cover {
            background-color: #eee;
        }
        .book-title {
            font-size: 13px;
            color: #fff;
            margin-bottom: 4px;
            line-height: 1.4;
            text-decoration: none;
            display: block;
        }
        body.light .book-title {
            color: #333;
        }
        .book-author {
            font-size: 11px;
            color: #e0e0e0;
        }
        body.light .book-author {
            color: #666;
        }

        .theme-toggle {
            cursor: pointer;
            font-size: 16px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title" id="homeLink">SParks 的书架</div>
        <div class="header-nav">
            <a href="#">搜书</a>
            <a href="category.html">分类</a>
            <a href="about.html">关于</a>
            <span class="theme-toggle">☀️</span>
        </div>
    </div>

    <div class="quote">
        <div class="quote-text">黑发不知勤学早，白发方悔读书迟。</div>
        <div class="quote-author">- 颜真卿</div>
    </div>

    <div class="search-bar">
        <input type="text" class="search-input" placeholder="输入关键词搜索">
        <button class="search-btn">搜索</button>
    </div>

    <!-- 常规大类别 -->
    <div class="category-section" id="regularSection">
        <div class="category-title">📖 常规</div>
        <div class="filter-buttons" id="regularFilterButtons">
            <div class="filter-btn" data-filter="author">作者</div>
            <div class="filter-btn" data-filter="genre">文体</div>
            <div class="filter-btn" data-filter="field">领域</div>
        </div>
        <div id="regularSubtags" class="subtags"></div>

        <div class="sub-section">
            <h3>常规笔记</h3>
            <div id="notesContainer" class="book-list"></div>
        </div>
        <div class="sub-section">
            <h3>常规资源</h3>
            <div id="resourcesContainer" class="book-list"></div>
        </div>
    </div>

    <!-- 画画大类别 -->
    <div class="category-section" id="drawingSection">
        <div class="category-title">🎨 画画</div>
        <div class="filter-buttons" id="drawingFilterButtons">
            <div class="filter-btn" data-filter="regularPlan">正规计划</div>
            <div class="filter-btn" data-filter="minorCourses">辅修课程</div>
        </div>
        <div id="drawingSubtags" class="subtags"></div>

        <div class="sub-section">
            <h3>正规计划书库</h3>
            <div id="regularPlanContainer" class="book-list"></div>
        </div>
        <div class="sub-section">
            <h3>辅修课程书库</h3>
            <div id="minorCoursesContainer" class="book-list"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        (function() {
            if (!window.SITE_DATA) {
                console.error('数据文件未加载，请检查 data.js');
                return;
            }
            const data = window.SITE_DATA;

            // ---------- 常规部分 ----------
            let regularActiveFilter = 'author';     // 当前选中的筛选类型
            let regularActiveSubtag = null;         // 当前选中的子标签值

            // 获取所有可能的子标签（作者、文体、领域）
            function getRegularSubtags() {
                const authors = new Set();
                const genres = new Set();
                const fields = new Set();
                [...data.notes, ...data.resources].forEach(item => {
                    if (item.author) authors.add(item.author);
                    if (item.genre) genres.add(item.genre);
                    if (item.field) fields.add(item.field);
                });
                return { authors: [...authors], genres: [...genres], fields: [...fields] };
            }

            // 渲染常规子标签行
            function renderRegularSubtags() {
                const { authors, genres, fields } = getRegularSubtags();
                let list = [];
                if (regularActiveFilter === 'author') list = authors;
                else if (regularActiveFilter === 'genre') list = genres;
                else if (regularActiveFilter === 'field') list = fields;

                const container = document.getElementById('regularSubtags');
                if (!container) return;
                if (list.length === 0) {
                    container.innerHTML = '<div style="text-align:center; width:100%;">暂无标签</div>';
                    return;
                }
                container.innerHTML = list.map(tag => `<span class="subtag ${regularActiveSubtag === tag ? 'active' : ''}" data-tag="${tag}">${tag}</span>`).join('');
                // 绑定点击事件
                document.querySelectorAll('#regularSubtags .subtag').forEach(el => {
                    el.addEventListener('click', (e) => {
                        const tag = e.target.dataset.tag;
                        if (regularActiveSubtag === tag) {
                            regularActiveSubtag = null;
                        } else {
                            regularActiveSubtag = tag;
                        }
                        renderRegularSubtags();
                        renderRegularContent();
                    });
                });
            }

            // 筛选常规内容
            function filterRegularItems(items) {
                if (!regularActiveSubtag) return items;
                return items.filter(item => {
                    if (regularActiveFilter === 'author') return item.author === regularActiveSubtag;
                    if (regularActiveFilter === 'genre') return item.genre === regularActiveSubtag;
                    if (regularActiveFilter === 'field') return item.field === regularActiveSubtag;
                    return true;
                });
            }

            function renderRegularContent() {
                const filteredNotes = filterRegularItems(data.notes);
                const filteredResources = filterRegularItems(data.resources);

                const notesHtml = filteredNotes.map(note => `
                    <div class="book-item">
                        <img class="book-cover" src="https://p1.ssl.qhimg.com/t01d4a0a0e0a8a8a8a8.jpg" alt="${note.title}">
                        <a href="${note.link}" class="book-title">${note.title}</a>
                        <div class="book-author">${note.author}</div>
                    </div>
                `).join('');
                document.getElementById('notesContainer').innerHTML = notesHtml || '<div>暂无笔记</div>';

                const resourcesHtml = filteredResources.map(res => `
                    <div class="book-item">
                        <img class="book-cover" src="https://p1.ssl.qhimg.com/t01d4a0a0e0a8a8a8a8.jpg" alt="${res.title}">
                        <a href="${res.link}" target="_blank" class="book-title">${res.title}</a>
                        <div class="book-author">${res.author}</div>
                    </div>
                `).join('');
                document.getElementById('resourcesContainer').innerHTML = resourcesHtml || '<div>暂无资源</div>';
            }

            // 常规按钮切换
            function initRegular() {
                const btns = document.querySelectorAll('#regularFilterButtons .filter-btn');
                btns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        btns.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        regularActiveFilter = btn.dataset.filter;
                        regularActiveSubtag = null;
                        renderRegularSubtags();
                        renderRegularContent();
                    });
                });
                // 默认激活作者按钮
                document.querySelector('#regularFilterButtons .filter-btn[data-filter="author"]').classList.add('active');
                renderRegularSubtags();
                renderRegularContent();
            }

            // ---------- 画画部分 ----------
            let drawingActiveFilter = 'regularPlan';   // 'regularPlan' 或 'minorCourses'
            let drawingActiveSubtag = null;

            // 从画画数据中提取子标签（假设每个条目有 tags 字段，如果没有则自动生成）
            function getDrawingSubtags(type) {
                const items = type === 'regularPlan' ? data.regularPlan : data.minorCourses;
                const tagsSet = new Set();
                items.forEach(item => {
                    if (item.tags && Array.isArray(item.tags)) {
                        item.tags.forEach(t => tagsSet.add(t));
                    } else {
                        // 如果没有 tags，则用标题的第一个词或默认生成
                        const firstWord = item.title.split(/\s+/)[0];
                        if (firstWord && firstWord.length > 1) tagsSet.add(firstWord);
                        else tagsSet.add('基础');
                    }
                });
                // 确保至少有一些默认标签
                if (tagsSet.size === 0) {
                    if (type === 'regularPlan') tagsSet.add('素描', '色彩', '构图');
                    else tagsSet.add('速写', '水彩', '插画');
                }
                return [...tagsSet];
            }

            function renderDrawingSubtags() {
                const tags = getDrawingSubtags(drawingActiveFilter);
                const container = document.getElementById('drawingSubtags');
                if (!container) return;
                if (tags.length === 0) {
                    container.innerHTML = '<div style="text-align:center; width:100%;">暂无标签</div>';
                    return;
                }
                container.innerHTML = tags.map(tag => `<span class="subtag ${drawingActiveSubtag === tag ? 'active' : ''}" data-tag="${tag}">${tag}</span>`).join('');
                document.querySelectorAll('#drawingSubtags .subtag').forEach(el => {
                    el.addEventListener('click', (e) => {
                        const tag = e.target.dataset.tag;
                        if (drawingActiveSubtag === tag) {
                            drawingActiveSubtag = null;
                        } else {
                            drawingActiveSubtag = tag;
                        }
                        renderDrawingSubtags();
                        renderDrawingContent();
                    });
                });
            }

            function filterDrawingItems(items) {
                if (!drawingActiveSubtag) return items;
                return items.filter(item => {
                    if (item.tags && item.tags.includes(drawingActiveSubtag)) return true;
                    // 如果没有 tags 字段，则尝试匹配标题包含子标签
                    return item.title.includes(drawingActiveSubtag);
                });
            }

            function renderDrawingContent() {
                let regularItems = data.regularPlan || [];
                let minorItems = data.minorCourses || [];
                if (drawingActiveFilter === 'regularPlan') {
                    regularItems = filterDrawingItems(regularItems);
                } else if (drawingActiveFilter === 'minorCourses') {
                    minorItems = filterDrawingItems(minorItems);
                }
                // 无论选哪个，两个区域都显示，但只有当前激活的区域会被筛选
                const regularHtml = regularItems.map(book => `
                    <div class="book-item">
                        <img class="book-cover" src="https://p1.ssl.qhimg.com/t01d4a0a0e0a8a8a8a8.jpg" alt="${book.title}">
                        <a href="${book.link}" class="book-title">${book.title}</a>
                        <div class="book-author">${book.author}</div>
                    </div>
                `).join('');
                document.getElementById('regularPlanContainer').innerHTML = regularHtml || '<div>暂无内容</div>';

                const minorHtml = minorItems.map(book => `
                    <div class="book-item">
                        <img class="book-cover" src="https://p1.ssl.qhimg.com/t01d4a0a0e0a8a8a8a8.jpg" alt="${book.title}">
                        <a href="${book.link}" class="book-title">${book.title}</a>
                        <div class="book-author">${book.author}</div>
                    </div>
                `).join('');
                document.getElementById('minorCoursesContainer').innerHTML = minorHtml || '<div>暂无内容</div>';
            }

            function initDrawing() {
                const btns = document.querySelectorAll('#drawingFilterButtons .filter-btn');
                btns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        btns.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        drawingActiveFilter = btn.dataset.filter;
                        drawingActiveSubtag = null;
                        renderDrawingSubtags();
                        renderDrawingContent();
                    });
                });
                // 默认激活正规计划按钮
                document.querySelector('#drawingFilterButtons .filter-btn[data-filter="regularPlan"]').classList.add('active');
                renderDrawingSubtags();
                renderDrawingContent();
            }

            // 初始化所有
            initRegular();
            initDrawing();

            // 主题切换
            const toggle = document.querySelector('.theme-toggle');
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light');
                toggle.textContent = '🌙';
            } else {
                document.body.classList.remove('light');
                toggle.textContent = '☀️';
            }
            toggle.addEventListener('click', () => {
                const isLight = document.body.classList.toggle('light');
                localStorage.setItem('theme', isLight ? 'light' : 'dark');
                toggle.textContent = isLight ? '🌙' : '☀️';
            });

            // 首页链接
            document.getElementById('homeLink').addEventListener('click', () => {
                window.location.href = 'index.html';
            });
        })();
    </script>
</body>
</html>

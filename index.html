<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SParks 的书架</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            transition: all 0.3s ease;
        }

        body {
            background-color: #6b7b76;
            background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 4px);
            color: #ffffff;
            padding: 20px;
        }

        body.light {
            background-color: #f0ebe5;
            background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.02) 0px, rgba(0,0,0,0.02) 1px, transparent 1px, transparent 4px);
            color: #333333;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
            border-radius: 8px;
            margin-bottom: 40px;
        }
        body.light .header {
            background-color: rgba(255, 255, 255, 0.7);
        }

        .header-title {
            font-size: 20px;
            font-weight: 500;
            cursor: pointer;
        }
        .header-nav {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .header-nav a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
        }
        body.light .header-nav a {
            color: #333;
        }
        .header-nav a:first-child {
            color: #ff6b35;
            font-weight: 500;
        }

        .quote {
            text-align: center;
            margin-bottom: 30px;
        }
        .quote-text {
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 10px;
        }
        .quote-author {
            font-size: 14px;
            color: #e0e0e0;
        }
        body.light .quote-author {
            color: #666;
        }

        .search-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        .search-input {
            width: 500px;
            padding: 10px 15px;
            border: none;
            border-radius: 4px 0 0 4px;
            background-color: rgba(0, 0, 0, 0.2);
            color: #fff;
            font-size: 14px;
        }
        body.light .search-input {
            background-color: rgba(255, 255, 255, 0.7);
            color: #333;
        }
        .search-input::placeholder {
            color: #ccc;
        }
        .search-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 0 4px 4px 0;
            background-color: #ffffff;
            color: #333333;
            font-size: 14px;
            cursor: pointer;
        }
        .search-dropdown {
            padding: 10px 10px;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 4px 0 0 4px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        body.light .search-dropdown {
            background-color: rgba(255, 255, 255, 0.7);
        }

        .hot-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 40px;
        }
        .tag {
            padding: 4px 10px;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            font-size: 12px;
            color: #fff;
            cursor: pointer;
        }
        body.light .tag {
            background-color: rgba(255, 255, 255, 0.7);
            color: #555;
        }
        .tag.active {
            background-color: #ff6b35;
            color: #fff;
        }

        .section {
            margin-bottom: 40px;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .section-title {
            padding: 6px 12px;
            background-color: #ff6b35;
            color: #ffffff;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
        }
        .section-more {
            font-size: 12px;
            color: #fff;
            text-decoration: none;
        }
        body.light .section-more {
            color: #555;
        }

        .book-list {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        .book-item {
            width: 160px;
            flex-shrink: 0;
        }
        .book-cover {
            width: 100%;
            height: 220px;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            margin-bottom: 8px;
            object-fit: cover;
        }
        body.light .book-cover {
            background-color: #eee;
        }
        .book-title {
            font-size: 13px;
            color: #fff;
            margin-bottom: 4px;
            line-height: 1.4;
            text-decoration: none;
            display: block;
        }
        body.light .book-title {
            color: #333;
        }
        .book-author {
            font-size: 11px;
            color: #e0e0e0;
        }
        body.light .book-author {
            color: #666;
        }

        .plan-block {
            background-color: rgba(0,0,0,0.1);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        body.light .plan-block {
            background-color: rgba(255,255,255,0.6);
        }
        .sub-section {
            margin-top: 20px;
        }
        .sub-section h3 {
            font-size: 16px;
            margin-bottom: 10px;
            padding-left: 8px;
            border-left: 3px solid #ff6b35;
        }

        .theme-toggle {
            cursor: pointer;
            font-size: 16px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title" id="homeLink">SParks 的书架</div>
        <div class="header-nav">
            <a href="#">搜书</a>
            <a href="category.html">分类</a>
            <a href="about.html">关于</a>
            <span class="theme-toggle">☀️</span>
        </div>
    </div>

    <div class="quote">
        <div class="quote-text">黑发不知勤学早，白发方悔读书迟。</div>
        <div class="quote-author">- 颜真卿</div>
    </div>

    <div class="search-bar">
        <div class="search-dropdown">
            <span>🔍</span>
            <span>搜书</span>
            <span>▼</span>
        </div>
        <input type="text" class="search-input" placeholder="输入关键词搜索">
        <button class="search-btn">搜索</button>
    </div>

    <!-- 筛选标签区域：作者、文体、领域 -->
    <div class="hot-tags" id="filterTags"></div>

    <div class="section">
        <div class="section-header">
            <div class="section-title">常规笔记</div>
            <a href="category.html" class="section-more">查看更多 ></a>
        </div>
        <div id="notesContainer" class="book-list"></div>
    </div>

    <div class="section">
        <div class="section-header">
            <div class="section-title">常规资源</div>
            <a href="category.html" class="section-more">查看更多 ></a>
        </div>
        <div id="resourcesContainer" class="book-list"></div>
    </div>

    <div class="section">
        <div class="section-header">
            <div class="section-title">画画</div>
        </div>
        <div class="sub-section">
            <h3>正规计划</h3>
            <div class="plan-block" id="regularPlanDesc">系统学习绘画的路线图，包括素描、色彩、构图等基础训练。</div>
            <div id="regularPlanSubtags" class="hot-tags" style="margin-bottom: 10px;"></div>
            <div id="regularPlanContainer" class="book-list"></div>
        </div>
        <div class="sub-section">
            <h3>辅修课程</h3>
            <div id="minorCoursesSubtags" class="hot-tags" style="margin-bottom: 10px;"></div>
            <div id="minorCoursesContainer" class="book-list"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        (function() {
            if (!window.SITE_DATA) {
                console.error('数据文件未加载');
                return;
            }
            const data = window.SITE_DATA;

            // ---------- 常规部分筛选 ----------
            let regularActiveType = null;   // 'author', 'genre', 'field'
            let regularActiveValue = null;

            function getRegularTagOptions() {
                const authors = new Set();
                const genres = new Set();
                const fields = new Set();
                [...data.notes, ...data.resources].forEach(item => {
                    if (item.author) authors.add(item.author);
                    if (item.genre) genres.add(item.genre);
                    if (item.field) fields.add(item.field);
                });
                return { authors: [...authors], genres: [...genres], fields: [...fields] };
            }

            function renderRegularFilters() {
                const { authors, genres, fields } = getRegularTagOptions();
                const container = document.getElementById('filterTags');
                if (!container) return;

                let html = '';
                if (authors.length) {
                    html += `<div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; width: 100%; margin-bottom: 8px;">
                                <span style="color: #ff6b35; font-size: 12px; margin-right: 4px;">作者：</span>`;
                    authors.forEach(author => {
                        const active = (regularActiveType === 'author' && regularActiveValue === author) ? 'active' : '';
                        html += `<span class="tag ${active}" data-type="author" data-value="${author}">${author}</span>`;
                    });
                    html += `</div>`;
                }
                if (genres.length) {
                    html += `<div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; width: 100%; margin-bottom: 8px;">
                                <span style="color: #ff6b35; font-size: 12px; margin-right: 4px;">文体：</span>`;
                    genres.forEach(genre => {
                        const active = (regularActiveType === 'genre' && regularActiveValue === genre) ? 'active' : '';
                        html += `<span class="tag ${active}" data-type="genre" data-value="${genre}">${genre}</span>`;
                    });
                    html += `</div>`;
                }
                if (fields.length) {
                    html += `<div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; width: 100%;">
                                <span style="color: #ff6b35; font-size: 12px; margin-right: 4px;">领域：</span>`;
                    fields.forEach(field => {
                        const active = (regularActiveType === 'field' && regularActiveValue === field) ? 'active' : '';
                        html += `<span class="tag ${active}" data-type="field" data-value="${field}">${field}</span>`;
                    });
                    html += `</div>`;
                }
                container.innerHTML = html;

                document.querySelectorAll('#filterTags .tag').forEach(tag => {
                    tag.addEventListener('click', (e) => {
                        const type = tag.dataset.type;
                        const value = tag.dataset.value;
                        if (regularActiveType === type && regularActiveValue === value) {
                            regularActiveType = null;
                            regularActiveValue = null;
                        } else {
                            regularActiveType = type;
                            regularActiveValue = value;
                        }
                        renderRegularFilters();
                        renderRegularContent();
                    });
                });
            }

            function filterRegularItems(items) {
                if (!regularActiveType || !regularActiveValue) return items;
                return items.filter(item => {
                    if (regularActiveType === 'author') return item.author === regularActiveValue;
                    if (regularActiveType === 'genre') return item.genre === regularActiveValue;
                    if (regularActiveType === 'field') return item.field === regularActiveValue;
                    return true;
                });
            }

            function renderRegularContent() {
                const filteredNotes = filterRegularItems(data.notes);
                const filteredResources = filterRegularItems(data.resources);

                const notesHtml = filteredNotes.map(note => `
                    <div class="book-item">
                        <img class="book-cover" src="https://p1.ssl.qhimg.com/t01d4a0a0e0a8a8a8a8.jpg" alt="${note.title}">
                        <a href="${note.link}" class="book-title">${note.title}</a>
                        <div class="book-author">${note.author}</div>
                    </div>
                `).join('');
                document.getElementById('notesContainer').innerHTML = notesHtml || '<div>暂无笔记</div>';

                const resourcesHtml = filteredResources.map(res => `
                    <div class="book-item">
                        <img class="book-cover" src="https://p1.ssl.qhimg.com/t01d4a0a0e0a8a8a8a8.jpg" alt="${res.title}">
                        <a href="${res.link}" target="_blank" class="book-title">${res.title}</a>
                        <div class="book-author">${res.author}</div>
                    </div>
                `).join('');
                document.getElementById('resourcesContainer').innerHTML = resourcesHtml || '<div>暂无资源</div>';
            }

            // ---------- 画画模块子标签 ----------
            let regularPlanActiveTag = null;
            let minorCoursesActiveTag = null;

            function getDrawingTags(categoryKey) {
                const items = categoryKey === 'regularPlan' ? data.regularPlan : data.minorCourses;
                const tagsSet = new Set();
                items.forEach(item => {
                    if (item.tags && Array.isArray(item.tags)) {
                        item.tags.forEach(t => tagsSet.add(t));
                    } else {
                        const words = item.title.split(/\s+/);
                        if (words.length > 0 && words[0].length > 1) tagsSet.add(words[0]);
                        else tagsSet.add('基础');
                    }
                });
                if (tagsSet.size === 0) {
                    if (categoryKey === 'regularPlan') tagsSet.add('素描', '色彩', '构图');
                    else tagsSet.add('速写', '水彩', '插画');
                }
                return [...tagsSet];
            }

            function renderDrawingSubtags(categoryKey, containerId, activeTagVarName) {
                const container = document.getElementById(containerId);
                if (!container) return;
                const tags = getDrawingTags(categoryKey);
                if (tags.length === 0) {
                    container.innerHTML = '';
                    return;
                }
                let html = '';
                tags.forEach(tag => {
                    const activeClass = (window[activeTagVarName] === tag) ? 'active' : '';
                    html += `<span class="tag ${activeClass}" data-tag="${tag}">${tag}</span>`;
                });
                container.innerHTML = html;

                container.querySelectorAll('.tag').forEach(tagEl => {
                    tagEl.addEventListener('click', (e) => {
                        const tagValue = tagEl.dataset.tag;
                        if (window[activeTagVarName] === tagValue) {
                            window[activeTagVarName] = null;
                        } else {
                            window[activeTagVarName] = tagValue;
                        }
                        renderDrawingSubtags(categoryKey, containerId, activeTagVarName);
                        renderDrawingContent(categoryKey);
                    });
                });
            }

            function renderDrawingContent(categoryKey) {
                const items = categoryKey === 'regularPlan' ? data.regularPlan : data.minorCourses;
                const activeTag = categoryKey === 'regularPlan' ? regularPlanActiveTag : minorCoursesActiveTag;
                let filtered = items;
                if (activeTag) {
                    filtered = items.filter(item => {
                        if (item.tags && item.tags.includes(activeTag)) return true;
                        return item.title.includes(activeTag);
                    });
                }
                const containerId = categoryKey === 'regularPlan' ? 'regularPlanContainer' : 'minorCoursesContainer';
                const container = document.getElementById(containerId);
                if (!container) return;
                const html = filtered.map(book => `
                    <div class="book-item">
                        <img class="book-cover" src="https://p1.ssl.qhimg.com/t01d4a0a0e0a8a8a8a8.jpg" alt="${book.title}">
                        <a href="${book.link}" class="book-title">${book.title}</a>
                        <div class="book-author">${book.author}</div>
                    </div>
                `).join('');
                container.innerHTML = html || '<div>暂无内容</div>';
            }

            // 初始化
            renderRegularFilters();
            renderRegularContent();
            renderDrawingSubtags('regularPlan', 'regularPlanSubtags', 'regularPlanActiveTag');
            renderDrawingContent('regularPlan');
            renderDrawingSubtags('minorCourses', 'minorCoursesSubtags', 'minorCoursesActiveTag');
            renderDrawingContent('minorCourses');

            // 主题切换
            const toggle = document.querySelector('.theme-toggle');
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light');
                toggle.textContent = '🌙';
            } else {
                document.body.classList.remove('light');
                toggle.textContent = '☀️';
            }
            toggle.addEventListener('click', () => {
                const isLight = document.body.classList.toggle('light');
                localStorage.setItem('theme', isLight ? 'light' : 'dark');
                toggle.textContent = isLight ? '🌙' : '☀️';
            });

            // 首页链接
            document.getElementById('homeLink').addEventListener('click', () => {
                window.location.href = 'index.html';
            });
        })();
    </script>
</body>
</html>

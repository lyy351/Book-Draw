<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SParks 的书架</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            transition: all 0.3s ease;
        }

        /* 黑夜模式 */
        body {
            background-color: #6b7b76;
            background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 4px);
            color: #ffffff;
            padding: 20px;
        }

        /* 白天模式 */
        body.light {
            background-color: #f0ebe5;
            background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.02) 0px, rgba(0,0,0,0.02) 1px, transparent 1px, transparent 4px);
            color: #333333;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            margin-bottom: 40px;
        }
        body.light .header {
            background-color: rgba(255, 255, 255, 0.7);
        }

        .header-title {
            font-size: 20px;
            font-weight: 500;
        }
        .header-nav {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .header-nav a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
        }
        body.light .header-nav a {
            color: #333;
        }
        .header-nav a:first-child {
            color: #ff6b35;
            font-weight: 500;
        }

        .quote {
            text-align: center;
            margin-bottom: 30px;
        }
        .quote-text {
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 10px;
        }
        .quote-author {
            font-size: 14px;
            color: #e0e0e0;
        }
        body.light .quote-author {
            color: #666;
        }

        .search-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        .search-input {
            width: 500px;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            background-color: rgba(0, 0, 0, 0.2);
            color: #fff;
            font-size: 14px;
        }
        body.light .search-input {
            background-color: rgba(255, 255, 255, 0.7);
            color: #333;
        }
        .search-input::placeholder {
            color: #ccc;
        }
        .search-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            background-color: #ffffff;
            color: #333333;
            font-size: 14px;
            cursor: pointer;
        }

        /* 筛选标签区域（原热门标签样式） */
        .hot-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 40px;
            background-color: rgba(0,0,0,0.05);
            border-radius: 8px;
            padding: 15px;
        }
        body.light .hot-tags {
            background-color: rgba(255,255,255,0.3);
        }
        .tag-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            margin-right: 20px;
        }
        .tag-group-title {
            font-size: 13px;
            font-weight: 500;
            color: #ff6b35;
            margin-right: 4px;
        }
        .tag {
            padding: 4px 10px;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            font-size: 12px;
            color: #fff;
            cursor: pointer;
        }
        body.light .tag {
            background-color: rgba(255, 255, 255, 0.7);
            color: #555;
        }
        .tag.active {
            background-color: #ff6b35;
            color: #fff;
        }

        .section {
            margin-bottom: 40px;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .section-title {
            padding: 6px 12px;
            background-color: #ff6b35;
            color: #ffffff;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
        }
        .section-more {
            font-size: 12px;
            color: #fff;
            text-decoration: none;
        }
        body.light .section-more {
            color: #555;
        }

        .book-list {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        .book-item {
            width: 160px;
            flex-shrink: 0;
        }
        .book-cover {
            width: 100%;
            height: 220px;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            margin-bottom: 8px;
            object-fit: cover;
        }
        body.light .book-cover {
            background-color: #eee;
        }
        .book-title {
            font-size: 13px;
            color: #fff;
            margin-bottom: 4px;
            line-height: 1.4;
            text-decoration: none;
            display: block;
        }
        body.light .book-title {
            color: #333;
        }
        .book-author {
            font-size: 11px;
            color: #e0e0e0;
        }
        body.light .book-author {
            color: #666;
        }

        /* 画画模块 */
        .plan-block {
            background-color: rgba(0,0,0,0.1);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        body.light .plan-block {
            background-color: rgba(255,255,255,0.6);
        }
        .sub-section {
            margin-top: 20px;
        }
        .sub-section h3 {
            font-size: 16px;
            margin-bottom: 10px;
            padding-left: 8px;
            border-left: 3px solid #ff6b35;
        }

        .theme-toggle {
            cursor: pointer;
            font-size: 16px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">SParks 的书架</div>
        <div class="header-nav">
            <a href="#">搜书</a>
            <a href="category.html">分类</a>
            <a href="about.html">关于</a>
            <span class="theme-toggle">☀️</span>
        </div>
    </div>

    <div class="quote">
        <div class="quote-text">黑发不知勤学早，白发方悔读书迟。</div>
        <div class="quote-author">- 颜真卿</div>
    </div>

    <div class="search-bar">
        <input type="text" class="search-input" placeholder="输入关键词搜索">
        <button class="search-btn">搜索</button>
    </div>

    <!-- 筛选标签区域（动态生成作者、文体、领域标签） -->
    <div class="hot-tags" id="filterTags"></div>

    <!-- 常规笔记区块 -->
    <div class="section">
        <div class="section-header">
            <div class="section-title">常规笔记</div>
            <a href="category.html" class="section-more">查看更多 ></a>
        </div>
        <div id="notesContainer" class="book-list"></div>
    </div>

    <!-- 常规资源区块 -->
    <div class="section">
        <div class="section-header">
            <div class="section-title">常规资源</div>
            <a href="category.html" class="section-more">查看更多 ></a>
        </div>
        <div id="resourcesContainer" class="book-list"></div>
    </div>

    <!-- 画画模块 -->
    <div class="section">
        <div class="section-header">
            <div class="section-title">画画</div>
        </div>
        <div class="sub-section">
            <h3>正规计划</h3>
            <div class="plan-block" id="regularPlanDesc">系统学习绘画的路线图，包括素描、色彩、构图等基础训练。</div>
            <div id="regularPlanContainer" class="book-list"></div>
        </div>
        <div class="sub-section">
            <h3>辅修课程</h3>
            <div id="minorCoursesContainer" class="book-list"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        // 等待数据加载
        let siteData = window.SITE_DATA;

        // 筛选状态
        let currentFilterType = null;   // 'author', 'genre', 'field'
        let currentFilterValue = null;   // 具体的值

        // 从数据中提取所有作者、文体、领域
        function getFilterOptions() {
            const authors = new Set();
            const genres = new Set();
            const fields = new Set();
            siteData.notes.forEach(item => {
                if (item.author) authors.add(item.author);
                if (item.genre) genres.add(item.genre);
                if (item.field) fields.add(item.field);
            });
            siteData.resources.forEach(item => {
                if (item.author) authors.add(item.author);
                if (item.genre) genres.add(item.genre);
                if (item.field) fields.add(item.field);
            });
            return { authors: [...authors], genres: [...genres], fields: [...fields] };
        }

        // 渲染筛选标签
        function renderFilterTags() {
            const { authors, genres, fields } = getFilterOptions();
            const container = document.getElementById('filterTags');
            if (!container) return;

            let html = '';
            if (authors.length) {
                html += `<div class="tag-group">
                            <span class="tag-group-title">作者：</span>`;
                authors.forEach(author => {
                    const active = (currentFilterType === 'author' && currentFilterValue === author) ? 'active' : '';
                    html += `<span class="tag ${active}" data-type="author" data-value="${author}">${author}</span>`;
                });
                html += `</div>`;
            }
            if (genres.length) {
                html += `<div class="tag-group">
                            <span class="tag-group-title">文体：</span>`;
                genres.forEach(genre => {
                    const active = (currentFilterType === 'genre' && currentFilterValue === genre) ? 'active' : '';
                    html += `<span class="tag ${active}" data-type="genre" data-value="${genre}">${genre}</span>`;
                });
                html += `</div>`;
            }
            if (fields.length) {
                html += `<div class="tag-group">
                            <span class="tag-group-title">领域：</span>`;
                fields.forEach(field => {
                    const active = (currentFilterType === 'field' && currentFilterValue === field) ? 'active' : '';
                    html += `<span class="tag ${active}" data-type="field" data-value="${field}">${field}</span>`;
                });
                html += `</div>`;
            }
            if (html === '') {
                html = '<div style="text-align:center; width:100%;">暂无筛选标签</div>';
            }
            container.innerHTML = html;

            // 绑定点击事件
            document.querySelectorAll('#filterTags .tag').forEach(tag => {
                tag.addEventListener('click', (e) => {
                    const type = tag.dataset.type;
                    const value = tag.dataset.value;
                    if (currentFilterType === type && currentFilterValue === value) {
                        // 取消选中
                        currentFilterType = null;
                        currentFilterValue = null;
                    } else {
                        currentFilterType = type;
                        currentFilterValue = value;
                    }
                    renderFilterTags();      // 刷新高亮
                    renderContent();         // 刷新内容
                });
            });
        }

        // 筛选函数
        function filterItems(items) {
            if (!currentFilterType || !currentFilterValue) return items;
            return items.filter(item => {
                if (currentFilterType === 'author') return item.author === currentFilterValue;
                if (currentFilterType === 'genre') return item.genre === currentFilterValue;
                if (currentFilterType === 'field') return item.field === currentFilterValue;
                return true;
            });
        }

        // 渲染常规笔记和资源
        function renderContent() {
            const filteredNotes = filterItems(siteData.notes);
            const filteredResources = filterItems(siteData.resources);

            const notesHtml = filteredNotes.map(note => `
                <div class="book-item">
                    <img class="book-cover" src="https://p1.ssl.qhimg.com/t01d4a0a0e0a8a8a8a8.jpg" alt="${note.title}">
                    <a href="${note.link}" class="book-title">${note.title}</a>
                    <div class="book-author">${note.author}</div>
                </div>
            `).join('');
            document.getElementById('notesContainer').innerHTML = notesHtml || '<div>暂无笔记</div>';

            const resourcesHtml = filteredResources.map(res => `
                <div class="book-item">
                    <img class="book-cover" src="https://p1.ssl.qhimg.com/t01d4a0a0e0a8a8a8a8.jpg" alt="${res.title}">
                    <a href="${res.link}" target="_blank" class="book-title">${res.title}</a>
                    <div class="book-author">${res.author}</div>
                </div>
            `).join('');
            document.getElementById('resourcesContainer').innerHTML = resourcesHtml || '<div>暂无资源</div>';
        }

        // 渲染画画模块
        function renderDrawing() {
            const regularHtml = siteData.regularPlan.map(book => `
                <div class="book-item">
                    <img class="book-cover" src="https://p1.ssl.qhimg.com/t01d4a0a0e0a8a8a8a8.jpg" alt="${book.title}">
                    <a href="${book.link}" class="book-title">${book.title}</a>
                    <div class="book-author">${book.author}</div>
                </div>
            `).join('');
            document.getElementById('regularPlanContainer').innerHTML = regularHtml || '<div>暂无内容</div>';

            const minorHtml = siteData.minorCourses.map(book => `
                <div class="book-item">
                    <img class="book-cover" src="https://p1.ssl.qhimg.com/t01d4a0a0e0a8a8a8a8.jpg" alt="${book.title}">
                    <a href="${book.link}" class="book-title">${book.title}</a>
                    <div class="book-author">${book.author}</div>
                </div>
            `).join('');
            document.getElementById('minorCoursesContainer').innerHTML = minorHtml || '<div>暂无内容</div>';
        }

        // 初始化
        function init() {
            if (!siteData) {
                console.error('数据文件未加载');
                return;
            }
            renderFilterTags();
            renderContent();
            renderDrawing();
        }

        init();

        // 统一主题切换
        const toggle = document.querySelector('.theme-toggle');
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.body.classList.add('light');
            toggle.textContent = '🌙';
        } else {
            document.body.classList.remove('light');
            toggle.textContent = '☀️';
        }
        toggle.addEventListener('click', () => {
            const isLight = document.body.classList.toggle('light');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            toggle.textContent = isLight ? '🌙' : '☀️';
        });
    </script>
</body>
</html>

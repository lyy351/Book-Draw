<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SParks 的书架</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            transition: all 0.3s ease;
        }

        body {
            background-color: #6b7b76;
            background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 4px);
            color: #ffffff;
            padding: 20px;
        }

        body.light {
            background-color: #f0ebe5;
            background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.02) 0px, rgba(0,0,0,0.02) 1px, transparent 1px, transparent 4px);
            color: #333333;
        }

        .sticky-top {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: inherit;
            backdrop-filter: blur(4px);
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            margin-bottom: 0;
        }
        body.light .header {
            background-color: rgba(255, 255, 255, 0.7);
        }

        .header-title {
            font-size: 20px;
            font-weight: 500;
            cursor: pointer;
        }
        .header-nav {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .header-nav a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
        }
        body.light .header-nav a {
            color: #333;
        }
        .header-nav a:first-child {
            color: #ff6b35;
            font-weight: 500;
        }

        .quote {
            text-align: center;
            margin: 20px 0 10px 0;
        }
        .quote-text {
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 10px;
        }
        .quote-author {
            font-size: 14px;
            color: #e0e0e0;
        }
        body.light .quote-author {
            color: #666;
        }

        .search-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        .search-input {
            width: 500px;
            padding: 10px 15px;
            border: none;
            border-radius: 4px 0 0 4px;
            background-color: rgba(0, 0, 0, 0.2);
            color: #fff;
            font-size: 14px;
        }
        body.light .search-input {
            background-color: rgba(255, 255, 255, 0.7);
            color: #333;
        }
        .search-input::placeholder {
            color: #ccc;
        }
        .search-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 0 4px 4px 0;
            background-color: #ffffff;
            color: #333333;
            font-size: 14px;
            cursor: pointer;
        }
        .search-dropdown {
            padding: 10px 10px;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 4px 0 0 4px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        body.light .search-dropdown {
            background-color: rgba(255, 255, 255, 0.7);
        }

        .hot-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 40px;
        }
        .tag {
            padding: 4px 10px;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            font-size: 12px;
            color: #fff;
            cursor: pointer;
        }
        body.light .tag {
            background-color: rgba(255, 255, 255, 0.7);
            color: #555;
        }
        /* 修复白天模式选中样式 */
        .tag.active {
            background-color: #ff6b35 !important;
            color: #fff !important;
        }

        .section {
            margin-bottom: 40px;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .section-title {
            padding: 6px 12px;
            background-color: #ff6b35;
            color: #ffffff;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            display: inline-block;
        }
        .section-more {
            font-size: 12px;
            color: #fff;
            text-decoration: none;
        }
        body.light .section-more {
            color: #555;
        }

        .book-list {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        .book-item {
            width: 160px;
            flex-shrink: 0;
        }
        .book-cover {
            width: 100%;
            height: 220px;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            margin-bottom: 8px;
            object-fit: cover;
        }
        body.light .book-cover {
            background-color: #eee;
        }
        .book-title {
            font-size: 13px;
            color: #fff;
            margin-bottom: 4px;
            line-height: 1.4;
            text-decoration: none;
            display: block;
        }
        body.light .book-title {
            color: #333;
        }
        .book-author {
            font-size: 11px;
            color: #e0e0e0;
        }
        body.light .book-author {
            color: #666;
        }

        .plan-block {
            background-color: rgba(0,0,0,0.1);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        body.light .plan-block {
            background-color: rgba(255,255,255,0.6);
        }
        .sub-section {
            margin-top: 20px;
        }
        .sub-section .section-title {
            margin-bottom: 12px;
        }

        .theme-toggle {
            cursor: pointer;
            font-size: 16px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="sticky-top">
        <div class="header">
            <div class="header-title" id="homeLink">SParks 的书架</div>
            <div class="header-nav">
                <a href="#">搜书</a>
                <a href="category.html">分类</a>
                <a href="about.html">关于</a>
                <span class="theme-toggle">☀️</span>
            </div>
        </div>
        <div class="quote">
            <div class="quote-text">黑发不知勤学早，白发方悔读书迟。</div>
            <div class="quote-author">- 颜真卿</div>
        </div>
        <div class="search-bar">
            <div class="search-dropdown">
                <span>🔍</span>
                <span>搜书</span>
                <span>▼</span>
            </div>
            <input type="text" class="search-input" placeholder="输入关键词搜索">
            <button class="search-btn">搜索</button>
        </div>
    </div>

    <div class="hot-tags" id="regularFilterTags"></div>

    <div class="section">
        <div class="section-header">
            <div class="section-title">常规笔记</div>
            <a href="category.html?category=notes" class="section-more">查看更多 ></a>
        </div>
        <div id="notesContainer" class="book-list"></div>
    </div>

    <div class="section">
        <div class="section-header">
            <div class="section-title">常规资源</div>
            <a href="category.html?category=resources" class="section-more">查看更多 ></a>
        </div>
        <div id="resourcesContainer" class="book-list"></div>
    </div>

    <div class="hot-tags" id="drawingFilterTags"></div>

    <div class="section">
        <div class="sub-section">
            <div class="section-header">
                <div class="section-title">正规计划</div>
                <a href="category.html?category=regularPlan" class="section-more">查看更多 ></a>
            </div>
            <div class="plan-block" id="regularPlanDesc">系统学习绘画的路线图，包括素描、色彩、构图等基础训练。</div>
            <div id="regularPlanContainer" class="book-list"></div>
        </div>
        <div class="sub-section">
            <div class="section-header">
                <div class="section-title">辅修课程</div>
                <a href="category.html?category=minorCourses" class="section-more">查看更多 ></a>
            </div>
            <div id="minorCoursesContainer" class="book-list"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        (function() {
            if (!window.SITE_DATA) {
                console.error('数据文件未加载');
                return;
            }
            const data = window.SITE_DATA;

            let regularActiveFilters = new Set();

            function getRegularTagOptions() {
                const authors = new Set();
                const genres = new Set();
                const fields = new Set();
                [...data.notes, ...data.resources].forEach(item => {
                    if (item.author) authors.add(item.author);
                    if (item.genre) genres.add(item.genre);
                    if (item.field) fields.add(item.field);
                });
                return { authors: [...authors], genres: [...genres], fields: [...fields] };
            }

            function renderRegularFilters() {
                const { authors, genres, fields } = getRegularTagOptions();
                const container = document.getElementById('regularFilterTags');
                if (!container) return;

                let html = '';
                if (authors.length) {
                    html += `<div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; width: 100%; margin-bottom: 8px;">`;
                    authors.forEach(author => {
                        const filterId = `author|${author}`;
                        const active = regularActiveFilters.has(filterId) ? 'active' : '';
                        html += `<span class="tag ${active}" data-type="author" data-value="${author}">${author}</span>`;
                    });
                    html += `</div>`;
                }
                if (genres.length) {
                    html += `<div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; width: 100%; margin-bottom: 8px;">`;
                    genres.forEach(genre => {
                        const filterId = `genre|${genre}`;
                        const active = regularActiveFilters.has(filterId) ? 'active' : '';
                        html += `<span class="tag ${active}" data-type="genre" data-value="${genre}">${genre}</span>`;
                    });
                    html += `</div>`;
                }
                if (fields.length) {
                    html += `<div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; width: 100%;">`;
                    fields.forEach(field => {
                        const filterId = `field|${field}`;
                        const active = regularActiveFilters.has(filterId) ? 'active' : '';
                        html += `<span class="tag ${active}" data-type="field" data-value="${field}">${field}</span>`;
                    });
                    html += `</div>`;
                }
                container.innerHTML = html;

                document.querySelectorAll('#regularFilterTags .tag').forEach(tag => {
                    tag.addEventListener('click', (e) => {
                        const type = tag.dataset.type;
                        const value = tag.dataset.value;
                        const filterId = `${type}|${value}`;
                        if (regularActiveFilters.has(filterId)) {
                            regularActiveFilters.delete(filterId);
                        } else {
                            regularActiveFilters.add(filterId);
                        }
                        renderRegularFilters();
                        renderRegularContent();
                    });
                });
            }

            function filterRegularItems(items) {
                if (regularActiveFilters.size === 0) return items;
                return items.filter(item => {
                    for (let filterId of regularActiveFilters) {
                        const [type, value] = filterId.split('|');
                        if (type === 'author' && item.author !== value) return false;
                        if (type === 'genre' && item.genre !== value) return false;
                        if (type === 'field' && item.field !== value) return false;
                    }
                    return true;
                });
            }

            function renderRegularContent() {
                const filteredNotes = filterRegularItems(data.notes);
                const filteredResources = filterRegularItems(data.resources);
                const defaultCover = 'https://p1.ssl.qhimg.com/t01d4a0a0e0a8a8a8a8.jpg';

                const notesHtml = filteredNotes.map(note => `
                    <div class="book-item">
                        <img class="book-cover" src="${note.cover || defaultCover}" alt="${note.title}">
                        <a href="${note.link}" class="book-title">${note.title}</a>
                        <div class="book-author">${note.author}</div>
                    </div>
                `).join('');
                document.getElementById('notesContainer').innerHTML = notesHtml || '<div>暂无笔记</div>';

                const resourcesHtml = filteredResources.map(res => `
                    <div class="book-item">
                        <img class="book-cover" src="${res.cover || defaultCover}" alt="${res.title}">
                        <a href="${res.link}" target="_blank" class="book-title">${res.title}</a>
                        <div class="book-author">${res.author}</div>
                    </div>
                `).join('');
                document.getElementById('resourcesContainer').innerHTML = resourcesHtml || '<div>暂无资源</div>';
            }

            // 画画部分
            let drawingActiveFilters = new Set();

            function getAllDrawingItems() {
                return [...(data.regularPlan || []), ...(data.minorCourses || [])];
            }

            function getDrawingTagOptions() {
                const types = new Set();
                const specialties = new Set();
                const allItems = getAllDrawingItems();
                allItems.forEach(item => {
                    let type = item.type || '书';
                    types.add(type);
                    let specialty = '';
                    if (item.specialty) specialty = item.specialty;
                    else if (item.tags && Array.isArray(item.tags) && item.tags.length) specialty = item.tags[0];
                    else specialty = item.title.split(/\s+/)[0] || '基础';
                    specialties.add(specialty);
                });
                if (types.size === 0) types.add('书');
                if (specialties.size === 0) specialties.add('基础');
                return { types: [...types], specialties: [...specialties] };
            }

            function renderDrawingFilters() {
                const { types, specialties } = getDrawingTagOptions();
                const container = document.getElementById('drawingFilterTags');
                if (!container) return;

                let html = '';
                if (types.length) {
                    html += `<div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; width: 100%; margin-bottom: 8px;">`;
                    types.forEach(type => {
                        const filterId = `type|${type}`;
                        const active = drawingActiveFilters.has(filterId) ? 'active' : '';
                        html += `<span class="tag ${active}" data-type="type" data-value="${type}">${type}</span>`;
                    });
                    html += `</div>`;
                }
                if (specialties.length) {
                    html += `<div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; width: 100%;">`;
                    specialties.forEach(specialty => {
                        const filterId = `specialty|${specialty}`;
                        const active = drawingActiveFilters.has(filterId) ? 'active' : '';
                        html += `<span class="tag ${active}" data-type="specialty" data-value="${specialty}">${specialty}</span>`;
                    });
                    html += `</div>`;
                }
                container.innerHTML = html;

                document.querySelectorAll('#drawingFilterTags .tag').forEach(tag => {
                    tag.addEventListener('click', (e) => {
                        const type = tag.dataset.type;
                        const value = tag.dataset.value;
                        const filterId = `${type}|${value}`;
                        if (drawingActiveFilters.has(filterId)) {
                            drawingActiveFilters.delete(filterId);
                        } else {
                            drawingActiveFilters.add(filterId);
                        }
                        renderDrawingFilters();
                        renderDrawingContent();
                    });
                });
            }

            function filterDrawingItems(items) {
                if (drawingActiveFilters.size === 0) return items;
                return items.filter(item => {
                    for (let filterId of drawingActiveFilters) {
                        const [type, value] = filterId.split('|');
                        if (type === 'type') {
                            const itemType = item.type || '书';
                            if (itemType !== value) return false;
                        } else if (type === 'specialty') {
                            let itemSpecialty = '';
                            if (item.specialty) itemSpecialty = item.specialty;
                            else if (item.tags && Array.isArray(item.tags) && item.tags.length) itemSpecialty = item.tags[0];
                            else itemSpecialty = item.title.split(/\s+/)[0] || '基础';
                            if (itemSpecialty !== value) return false;
                        }
                    }
                    return true;
                });
            }

            function renderDrawingContent() {
                const allItems = getAllDrawingItems();
                const filtered = filterDrawingItems(allItems);
                const regularPlanFiltered = filtered.filter(item => data.regularPlan.includes(item));
                const minorCoursesFiltered = filtered.filter(item => data.minorCourses.includes(item));
                const defaultCover = 'https://p1.ssl.qhimg.com/t01d4a0a0e0a8a8a8a8.jpg';

                const regularHtml = regularPlanFiltered.map(book => `
                    <div class="book-item">
                        <img class="book-cover" src="${book.cover || defaultCover}" alt="${book.title}">
                        <a href="${book.link}" class="book-title">${book.title}</a>
                        <div class="book-author">${book.author}</div>
                    </div>
                `).join('');
                document.getElementById('regularPlanContainer').innerHTML = regularHtml || '<div>暂无内容</div>';

                const minorHtml = minorCoursesFiltered.map(book => `
                    <div class="book-item">
                        <img class="book-cover" src="${book.cover || defaultCover}" alt="${book.title}">
                        <a href="${book.link}" class="book-title">${book.title}</a>
                        <div class="book-author">${book.author}</div>
                    </div>
                `).join('');
                document.getElementById('minorCoursesContainer').innerHTML = minorHtml || '<div>暂无内容</div>';
            }

            renderRegularFilters();
            renderRegularContent();
            renderDrawingFilters();
            renderDrawingContent();

            const toggle = document.querySelector('.theme-toggle');
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light');
                toggle.textContent = '🌙';
            } else {
                document.body.classList.remove('light');
                toggle.textContent = '☀️';
            }
            toggle.addEventListener('click', () => {
                const isLight = document.body.classList.toggle('light');
                localStorage.setItem('theme', isLight ? 'light' : 'dark');
                toggle.textContent = isLight ? '🌙' : '☀️';
            });

            document.getElementById('homeLink').addEventListener('click', () => {
                window.location.href = 'index.html';
            });
        })();
    </script>
</body>
</html>

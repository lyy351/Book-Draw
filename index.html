<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SParks 的书架</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            transition: all 0.3s ease;
        }

        /* 黑夜模式 */
        body {
            background-color: #6b7b76;
            background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 4px);
            color: #ffffff;
            padding: 20px;
        }

        /* 白天模式 */
        body.light {
            background-color: #f0ebe5;
            background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.02) 0px, rgba(0,0,0,0.02) 1px, transparent 1px, transparent 4px);
            color: #333333;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            margin-bottom: 40px;
        }
        body.light .header {
            background-color: rgba(255, 255, 255, 0.7);
        }

        .header-title {
            font-size: 20px;
            font-weight: 500;
        }
        .header-nav {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .header-nav a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
        }
        body.light .header-nav a {
            color: #333;
        }
        .header-nav a:first-child {
            color: #ff6b35;
            font-weight: 500;
        }

        .quote {
            text-align: center;
            margin-bottom: 30px;
        }
        .quote-text {
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 10px;
        }
        .quote-author {
            font-size: 14px;
            color: #e0e0e0;
        }
        body.light .quote-author {
            color: #666;
        }

        /* 筛选区域 */
        .filter-section {
            margin-bottom: 40px;
            background-color: rgba(0,0,0,0.1);
            border-radius: 8px;
            padding: 15px;
        }
        body.light .filter-section {
            background-color: rgba(255,255,255,0.5);
        }
        .filter-buttons {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        .filter-btn {
            padding: 6px 12px;
            background-color: rgba(0,0,0,0.2);
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        body.light .filter-btn {
            background-color: rgba(255,255,255,0.7);
            color: #333;
        }
        .filter-btn.active {
            background-color: #ff6b35;
            color: #fff;
        }
        .subtag-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        body.light .subtag-panel {
            border-top-color: rgba(0,0,0,0.1);
        }
        .subtag {
            padding: 4px 10px;
            background-color: rgba(0,0,0,0.15);
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        body.light .subtag {
            background-color: rgba(0,0,0,0.05);
        }
        .subtag.active {
            background-color: #ff6b35;
            color: #fff;
        }

        /* 内容区块 */
        .section {
            margin-bottom: 40px;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .section-title {
            padding: 6px 12px;
            background-color: #ff6b35;
            color: #ffffff;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
        }
        .section-more {
            font-size: 12px;
            color: #fff;
            text-decoration: none;
        }
        body.light .section-more {
            color: #555;
        }

        .book-list {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        .book-item {
            width: 160px;
            flex-shrink: 0;
        }
        .book-cover {
            width: 100%;
            height: 220px;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            margin-bottom: 8px;
            object-fit: cover;
        }
        body.light .book-cover {
            background-color: #eee;
        }
        .book-title {
            font-size: 13px;
            color: #fff;
            margin-bottom: 4px;
            line-height: 1.4;
            text-decoration: none;
            display: block;
        }
        body.light .book-title {
            color: #333;
        }
        .book-author {
            font-size: 11px;
            color: #e0e0e0;
        }
        body.light .book-author {
            color: #666;
        }

        /* 画画模块 */
        .plan-block {
            background-color: rgba(0,0,0,0.1);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        body.light .plan-block {
            background-color: rgba(255,255,255,0.6);
        }
        .sub-section {
            margin-top: 20px;
        }
        .sub-section h3 {
            font-size: 16px;
            margin-bottom: 10px;
            padding-left: 8px;
            border-left: 3px solid #ff6b35;
        }

        .theme-toggle {
            cursor: pointer;
            font-size: 16px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">SParks 的书架</div>
        <div class="header-nav">
            <a href="#">搜书</a>
            <a href="category.html">分类</a>
            <a href="about.html">关于</a>
            <span class="theme-toggle">☀️</span>
        </div>
    </div>

    <div class="quote">
        <div class="quote-text">黑发不知勤学早，白发方悔读书迟。</div>
        <div class="quote-author">- 颜真卿</div>
    </div>

    <!-- 筛选栏 -->
    <div class="filter-section">
        <div class="filter-buttons" id="filterButtons">
            <div class="filter-btn" data-type="author">作者</div>
            <div class="filter-btn" data-type="genre">文体</div>
            <div class="filter-btn" data-type="field">领域</div>
        </div>
        <div id="subtagPanel" class="subtag-panel"></div>
    </div>

    <!-- 常规笔记和资源展示区 -->
    <div class="section">
        <div class="section-header">
            <div class="section-title">常规笔记</div>
            <a href="category.html" class="section-more">查看更多 ></a>
        </div>
        <div id="notesContainer" class="book-list"></div>
    </div>

    <div class="section">
        <div class="section-header">
            <div class="section-title">常规资源</div>
            <a href="category.html" class="section-more">查看更多 ></a>
        </div>
        <div id="resourcesContainer" class="book-list"></div>
    </div>

    <!-- 画画模块 -->
    <div class="section">
        <div class="section-header">
            <div class="section-title">画画</div>
        </div>
        <!-- 正规计划 -->
        <div class="sub-section">
            <h3>正规计划</h3>
            <div class="plan-block" id="regularPlanDesc">这里写一些关于正规计划的介绍文字，例如：系统学习绘画的路线图，包括素描、色彩、构图等基础训练。</div>
            <div id="regularPlanContainer" class="book-list"></div>
        </div>
        <!-- 辅修课程 -->
        <div class="sub-section">
            <h3>辅修课程</h3>
            <div id="minorCoursesContainer" class="book-list"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        // 等待数据加载
        let siteData = window.SITE_DATA;

        // 当前选中的筛选类型和子标签值
        let currentFilterType = 'author';
        let currentSubtag = null;

        // 渲染筛选按钮（动态生成子标签）
        function renderFilters() {
            // 从数据中提取所有作者、文体、领域（去重）
            const authors = [...new Set(siteData.notes.map(n => n.author).concat(siteData.resources.map(r => r.author)))];
            const genres = [...new Set(siteData.notes.map(n => n.genre).concat(siteData.resources.map(r => r.genre)))];
            const fields = [...new Set(siteData.notes.map(n => n.field).concat(siteData.resources.map(r => r.field)))];

            // 更新子标签面板
            function updateSubtags() {
                let list = [];
                if (currentFilterType === 'author') list = authors;
                else if (currentFilterType === 'genre') list = genres;
                else if (currentFilterType === 'field') list = fields;

                const panel = document.getElementById('subtagPanel');
                panel.innerHTML = list.map(tag => `<span class="subtag ${currentSubtag === tag ? 'active' : ''}" data-tag="${tag}">${tag}</span>`).join('');
                // 绑定点击事件
                document.querySelectorAll('.subtag').forEach(el => {
                    el.addEventListener('click', (e) => {
                        currentSubtag = e.target.dataset.tag;
                        renderFilters(); // 重新渲染高亮
                        renderContent();  // 刷新内容
                    });
                });
            }
            updateSubtags();
        }

        // 筛选函数
        function filterItems(items) {
            if (!currentSubtag) return items;
            return items.filter(item => {
                if (currentFilterType === 'author') return item.author === currentSubtag;
                if (currentFilterType === 'genre') return item.genre === currentSubtag;
                if (currentFilterType === 'field') return item.field === currentSubtag;
                return true;
            });
        }

        // 渲染常规笔记和资源
        function renderContent() {
            const filteredNotes = filterItems(siteData.notes);
            const filteredResources = filterItems(siteData.resources);

            const notesHtml = filteredNotes.map(note => `
                <div class="book-item">
                    <img class="book-cover" src="https://p1.ssl.qhimg.com/t01d4a0a0e0a8a8a8a8.jpg" alt="${note.title}">
                    <a href="${note.link}" class="book-title">${note.title}</a>
                    <div class="book-author">${note.author}</div>
                </div>
            `).join('');
            document.getElementById('notesContainer').innerHTML = notesHtml || '<div>暂无笔记</div>';

            const resourcesHtml = filteredResources.map(res => `
                <div class="book-item">
                    <img class="book-cover" src="https://p1.ssl.qhimg.com/t01d4a0a0e0a8a8a8a8.jpg" alt="${res.title}">
                    <a href="${res.link}" target="_blank" class="book-title">${res.title}</a>
                    <div class="book-author">${res.author}</div>
                </div>
            `).join('');
            document.getElementById('resourcesContainer').innerHTML = resourcesHtml || '<div>暂无资源</div>';
        }

        // 渲染画画模块
        function renderDrawing() {
            const regularHtml = siteData.regularPlan.map(book => `
                <div class="book-item">
                    <img class="book-cover" src="https://p1.ssl.qhimg.com/t01d4a0a0e0a8a8a8a8.jpg" alt="${book.title}">
                    <a href="${book.link}" class="book-title">${book.title}</a>
                    <div class="book-author">${book.author}</div>
                </div>
            `).join('');
            document.getElementById('regularPlanContainer').innerHTML = regularHtml || '<div>暂无内容</div>';

            const minorHtml = siteData.minorCourses.map(book => `
                <div class="book-item">
                    <img class="book-cover" src="https://p1.ssl.qhimg.com/t01d4a0a0e0a8a8a8a8.jpg" alt="${book.title}">
                    <a href="${book.link}" class="book-title">${book.title}</a>
                    <div class="book-author">${book.author}</div>
                </div>
            `).join('');
            document.getElementById('minorCoursesContainer').innerHTML = minorHtml || '<div>暂无内容</div>';
        }

        // 初始化事件
        function init() {
            renderFilters();
            renderContent();
            renderDrawing();

            // 筛选按钮点击事件
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilterType = btn.dataset.type;
                    currentSubtag = null;
                    renderFilters();
                    renderContent();
                });
            });
            // 默认激活作者按钮
            document.querySelector('.filter-btn[data-type="author"]').classList.add('active');
        }

        // 等待数据加载完成后执行
        if (window.SITE_DATA) {
            init();
        } else {
            console.error('数据文件未加载');
        }

        // ========== 统一主题切换 ==========
        const toggle = document.querySelector('.theme-toggle');
        
        // 初始化：从 localStorage 读取主题
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.body.classList.add('light');
            toggle.textContent = '🌙';
        } else {
            document.body.classList.remove('light');
            toggle.textContent = '☀️';
        }

        // 切换主题并保存
        toggle.addEventListener('click', () => {
            const isLight = document.body.classList.toggle('light');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            toggle.textContent = isLight ? '🌙' : '☀️';
        });
        // ================================
    </script>
</body>
</html>
